<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Bee Nix // Suture Blue</title>
  <link rel="icon" href="assets/favicon.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #050f0f;
      overflow: hidden;
    }

    body {
      font-family: 'Share Tech Mono', monospace;
      user-select: none;
    }

    /* ── WRAP (full viewport) ─────────────────────────── */
    .wrap {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: #050f0f;
    }

    .wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(10,124,140,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(10,124,140,0.06) 1px, transparent 1px);
      background-size: 22px 22px;
      pointer-events: none;
    }

    /* corner marks */
    .corner {
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: rgba(10,124,140,0.3);
      border-style: solid;
      border-width: 0;
    }
    .corner.tl { top: 10px; left: 10px; border-top-width: 1.5px; border-left-width: 1.5px; }
    .corner.tr { top: 10px; right: 10px; border-top-width: 1.5px; border-right-width: 1.5px; }
    .corner.bl { bottom: 10px; left: 10px; border-bottom-width: 1.5px; border-left-width: 1.5px; }
    .corner.br { bottom: 10px; right: 10px; border-bottom-width: 1.5px; border-right-width: 1.5px; }

    /* ── ORBIT BUTTONS ───────────────────────────────────── */
    .orbit-btn {
      position: absolute;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 30;
      font-family: 'Share Tech Mono', monospace;
      transform: translate(-50%, -50%);
      pointer-events: auto;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
    }

    /* Nav arrow — white fill, larger, below panels */
    #backArrow {
      background: #ffffff;
      border: 2px solid #0a7c8c;
      color: #0a7c8c;
      font-size: 22px;
      width: 44px;
      height: 44px;
      display: none;
      z-index: 15;
    }
    #backArrow.vis { display: flex; }
    #backArrow:hover { background: #0a7c8c; color: #ffffff; }

    /* Theme button — no background, just a swatch dot, always on top */
    #themeBtn {
      background: none;
      border: none;
      width: 22px;
      height: 22px;
      display: flex;
      padding: 0;
      z-index: 40;
    }
    .theme-swatch {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.35);
      background: #0a7c8c;
      pointer-events: none;
      transition: border-color 0.2s;
    }
    #themeBtn:hover .theme-swatch { border-color: rgba(255,255,255,0.8); }

    @keyframes rainbow-spin {
      0%   { background: hsl(0,70%,60%); }
      14%  { background: hsl(50,80%,58%); }
      28%  { background: hsl(110,65%,48%); }
      42%  { background: hsl(170,70%,48%); }
      57%  { background: hsl(220,70%,62%); }
      71%  { background: hsl(270,65%,60%); }
      85%  { background: hsl(320,70%,58%); }
      100% { background: hsl(360,70%,60%); }
    }
    .theme-swatch.rainbow { animation: rainbow-spin 3s linear infinite; }

    /* Rainbow page-wide glow pulse — applied to wrap via JS */
    @keyframes rainbow-bg {
      0%   { background-color: #0a0308; }
      14%  { background-color: #080a03; }
      28%  { background-color: #03080a; }
      42%  { background-color: #03050a; }
      57%  { background-color: #06030a; }
      71%  { background-color: #0a0308; }
      85%  { background-color: #0a0605; }
      100% { background-color: #0a0308; }
    }

    /* ── VIEWS ────────────────────────────────────────── */
    .view {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.35s;
    }
    .view.hidden { opacity: 0; pointer-events: none; }
    .view svg {
    width: 100%;
    height: 100%;
    display: block;
    max-height: 100vh;
  }
  /* On portrait screens, let SVG be taller than wide */
  @media (max-aspect-ratio: 1/1) {
    .view svg {
      width: auto;
      height: 100%;
    }
  }

    /* ── SVG INTERACTIVITY ────────────────────────────── */
    .nd { cursor: pointer; }
    .nd:hover .nhalo { opacity: 1; }
    .nhalo { opacity: 0; transition: opacity 0.2s; }
    .tr { transition: stroke 0.4s, stroke-opacity 0.4s, filter 0.4s; }
    .tr.lit {
      stroke: #0a7c8c;
      stroke-opacity: 1;
      filter: drop-shadow(0 0 4px rgba(10,124,140,0.7));
    }

    /* ── PANEL ────────────────────────────────────────── */
    .panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% - 80px);
      max-width: 480px;
      max-height: calc(100% - 60px);
      background: var(--sp-bg, rgba(4,14,14,0.98));
      border: 1px solid var(--sp-bd, rgba(10,124,140,0.5));
      border-radius: 10px;
      overflow: hidden;
      display: none;
      flex-direction: column;
      z-index: 20;
    }
    .panel.vis {
      display: flex;
      animation: pop 0.2s ease forwards;
    }
    @keyframes pop {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.97); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    .p-header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--sp-hbg, rgba(10,124,140,0.15));
      border-bottom: 1px solid var(--sp-hbd, rgba(10,124,140,0.4));
      padding: 9px 12px;
    }
    .p-header-title {
      font-size: 13px;
      letter-spacing: 3px;
      color: var(--sp-tx, rgba(94,200,212,0.95));
      font-weight: 700;
    }
    .p-close {
      background: #ffffff;
      border: 2px solid var(--sp-link, #0a7c8c);
      border-radius: 4px;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--sp-link, #0a7c8c);
      font-size: 13px;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      line-height: 1;
      padding: 0;
      transition: background 0.18s, color 0.18s;
      flex-shrink: 0;
    }
    .p-close:hover { background: var(--sp-link, #0a7c8c); color: #ffffff; }

    .panel-body {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--sp-acc, rgba(10,124,140,0.4)) transparent;
    }
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--sp-acc, rgba(10,124,140,0.4)); border-radius: 2px; }

    .panel-inner { display: flex; gap: 14px; align-items: flex-start; }
    .panel-text  { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; }

    .p-desc {
      font-size: 13px;
      color: var(--sp-desc, rgba(180,225,220,0.9));
      line-height: 1.7;
      white-space: pre-line;
      letter-spacing: 0.3px;
    }
    .p-more {
      align-self: flex-start;
      margin-top: 12px;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--sp-link, #0a7c8c);
      background: #ffffff;
      border: 2px solid var(--sp-link, #0a7c8c);
      border-radius: 4px;
      padding: 5px 12px;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      transition: background 0.18s, color 0.18s;
      white-space: nowrap;
    }
    .p-more:hover { background: var(--sp-link, #0a7c8c); color: #ffffff; }

    .panel-img {
      flex: 0 0 auto;
      width: clamp(100px, 28%, 160px);
      min-height: 130px;
      max-height: 200px;
      align-self: stretch;
      border-radius: 6px;
      border: 1px solid var(--sp-bd, rgba(10,124,140,0.4));
      background: var(--sp-ibg, #0a1e1e);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .panel-img img  { width: 100%; height: 100%; object-fit: cover; display: block; }
    .img-ph {
      font-size: 10px;
      color: var(--sp-ph, rgba(10,124,140,0.5));
      text-align: center;
      letter-spacing: 1px;
      line-height: 2;
      padding: 10px;
    }

    /* ── SUB-ITEM PANEL (detail panel for sub-nodes) ───── */
    .sub-panel {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% - 60px);
      max-width: 520px;
      max-height: calc(100% - 60px);
      background: var(--sp-bg, rgba(4,14,14,0.98));
      border: 1px solid var(--sp-bd, rgba(10,124,140,0.5));
      border-radius: 10px;
      overflow: hidden;
      display: none;
      flex-direction: column;
      z-index: 25;
    }
    .sub-panel.vis { display: flex; animation: pop 0.2s ease forwards; }
    .sub-panel .p-header { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; background: var(--sp-hbg, rgba(10,124,140,0.15)); border-bottom: 1px solid var(--sp-hbd, rgba(10,124,140,0.4)); padding: 9px 12px; }
    .sub-panel .p-header-title { font-size: 12px; letter-spacing: 2px; color: var(--sp-tx, rgba(94,200,212,0.95)); font-weight: 700; }
    .sub-panel-body { flex: 1 1 auto; overflow-y: auto; padding: 16px; scrollbar-width: thin; scrollbar-color: var(--sp-acc, rgba(10,124,140,0.4)) transparent; }
    .sub-panel-body::-webkit-scrollbar { width: 4px; }
    .sub-panel-body::-webkit-scrollbar-thumb { background: var(--sp-acc, rgba(10,124,140,0.4)); border-radius: 2px; }
    .sub-panel-inner { display: flex; flex-direction: column; gap: 14px; }
    .sub-panel-text { font-size: 12px; color: var(--sp-desc, rgba(180,225,220,0.9)); line-height: 1.7; letter-spacing: 0.3px; white-space: pre-line; }
    .sub-panel-text a { color: var(--sp-link, #0a7c8c); text-decoration: none; border-bottom: 1px solid var(--sp-bd, rgba(10,124,140,0.4)); }
    .sub-panel-text a:hover { color: var(--sp-tx, #5ec8d4); }
    .sub-panel-img { width: 100%; max-height: 180px; border-radius: 6px; border: 1px solid var(--sp-bd, rgba(10,124,140,0.35)); background: var(--sp-ibg, #0a1e1e); overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .sub-panel-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .sub-panel-embed { width: 100%; aspect-ratio: 16/9; border-radius: 6px; overflow: hidden; border: 1px solid var(--sp-bd, rgba(10,124,140,0.35)); background: #000; }
    .sub-panel-embed iframe { width: 100%; height: 100%; border: none; display: block; }
    .sub-panel-img-ph { font-size: 10px; color: var(--sp-ph, rgba(10,124,140,0.5)); text-align: center; letter-spacing: 1px; padding: 20px; }

    /* sub-board node hover */
    .sub-nd { cursor: pointer; }
    .sub-nd:hover rect, .sub-nd:hover text { opacity: 0.8; }
    .sub-nd rect { transition: opacity 0.15s; }

    /* about CV link */
    .cv-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: #0a7c8c;
      background: #ffffff;
      border: 2px solid #0a7c8c;
      border-radius: 4px;
      padding: 4px 10px;
      text-decoration: none;
      font-family: 'Share Tech Mono', monospace;
      transition: background 0.18s, color 0.18s;
    }
    .cv-link:hover { background: #0a7c8c; color: #ffffff; }

    /* ── WRITING LINKS (sub-board corner bullets) ──────── */
    .writing-links {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 10;
      display: none;
      flex-direction: column;
      gap: 5px;
    }
    .writing-links.vis { display: flex; }
    .writing-links a {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--sp-link, #0a7c8c);
      text-decoration: none;
      font-family: 'Share Tech Mono', monospace;
      border-bottom: 1px solid var(--sp-bd, rgba(10,124,140,0.3));
      transition: color 0.15s;
      line-height: 1.6;
    }
    .writing-links a::before { content: "· "; opacity: 0.6; }
    .writing-links a:hover { color: var(--sp-tx, #5ec8d4); }
    .writing-links-label {
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--sp-ph, rgba(10,124,140,0.5));
      font-family: 'Share Tech Mono', monospace;
      margin-bottom: 2px;
    }

    /* ── SOCIAL ICON BUTTONS ────────────────────────── */
    .social-btn {
      display: inline-block;
      width: 28px;
      height: 28px;
      border-radius: 4px;
      border: 2px solid #0a7c8c;
      background: #ffffff;
      overflow: hidden;
      vertical-align: middle;
      margin-left: 6px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.18s, opacity 0.18s;
    }
    .social-btn:hover { opacity: 0.8; }
    .social-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- orbit buttons — positioned by JS around center node -->
  <button class="orbit-btn" id="themeBtn" onclick="cycleTheme()"><span class="theme-swatch" id="themeSwatch"></span></button>
  <button class="orbit-btn" id="backArrow" onclick="goHome()">←</button>

  <!-- ══════════════════════════════════════════════
       MAIN VIEW
  ══════════════════════════════════════════════ -->
  <div id="viewMain" class="view">
    <svg viewBox="0 0 660 520" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="gl"><feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="glb"><feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <!-- MAKING/THINKING top-left → center right-angle -->
      <polyline id="tr-making-thinking"   class="tr" points="220,150 220,216 294,216 294,260" fill="none" stroke="rgba(10,124,140,0.2)" stroke-width="2" stroke-linecap="square"/>
      <!-- GATHERING/SHARING right → center -->
      <polyline id="tr-gathering-sharing" class="tr" points="468,260 366,260"                 fill="none" stroke="rgba(10,124,140,0.2)" stroke-width="2" stroke-linecap="square"/>
      <!-- DISCUSSING bottom → center -->
      <polyline id="tr-discussing"        class="tr" points="330,304 330,370"                 fill="none" stroke="rgba(10,124,140,0.2)" stroke-width="2" stroke-linecap="square"/>
      <!-- junction dot -->
      <circle cx="294" cy="216" r="3" fill="rgba(10,124,140,0.25)"/>
      <!-- CENTER -->
      <g class="nd" onclick="activateCenter()">
        <circle cx="330" cy="260" r="54" fill="none" stroke="rgba(10,124,140,0.16)" stroke-width="1.2" stroke-dasharray="5 3"/>
        <circle cx="330" cy="260" r="46" fill="#071515" stroke="#0a7c8c" stroke-width="1.5" filter="url(#gl)"/>
        <circle class="nhalo" id="h-center" cx="330" cy="260" r="52" fill="none" stroke="#0a7c8c" stroke-width="2" filter="url(#glb)"/>
        <circle cx="330" cy="260" r="38" fill="#0a1e1e"/>
        <text x="330" y="253" text-anchor="middle" font-size="14" fill="#5ec8d4" letter-spacing="2" font-family="'Share Tech Mono',monospace">BEE NIX</text>
        <text x="330" y="271" text-anchor="middle" font-size="10" fill="rgba(94,200,212,0.5)" letter-spacing="1" font-family="'Share Tech Mono',monospace">SUTURE.BLUE</text>
      </g>
      <!-- MAKING/THINKING — IC chip, top-left -->
      <g class="nd" id="nd-making_thinking" onclick="activateNode('making_thinking')">
        <rect x="162" y="112" width="116" height="56" rx="3" fill="#071515" stroke="rgba(10,124,140,0.3)" stroke-width="1"/>
        <rect class="nhalo" id="h-making_thinking" x="157" y="107" width="126" height="66" rx="5" fill="none" stroke="#0a7c8c" stroke-width="1.5" filter="url(#glb)"/>
        <path d="M162,132 Q156,140 162,148" fill="none" stroke="rgba(10,124,140,0.4)" stroke-width="1"/>
        <line x1="162" y1="122" x2="148" y2="122" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="162" y1="132" x2="148" y2="132" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="162" y1="142" x2="148" y2="142" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="162" y1="152" x2="148" y2="152" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="278" y1="122" x2="292" y2="122" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="278" y1="132" x2="292" y2="132" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="278" y1="142" x2="292" y2="142" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="278" y1="152" x2="292" y2="152" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <text x="220" y="134" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#ffffff" font-weight="700" letter-spacing="1" font-family="'Share Tech Mono',monospace">MAKING /</text>
        <text x="220" y="150" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#ffffff" font-weight="700" letter-spacing="1" font-family="'Share Tech Mono',monospace">THINKING</text>
      </g>
      <!-- GATHERING/SHARING — Transistor, right, mirrored (arrow points left) -->
      <g class="nd" id="nd-gathering_sharing" onclick="activateNode('gathering_sharing')">
        <circle cx="516" cy="260" r="30" fill="#071515" stroke="rgba(10,124,140,0.3)" stroke-width="1"/>
        <circle class="nhalo" id="h-gathering_sharing" cx="516" cy="260" r="36" fill="none" stroke="#0a7c8c" stroke-width="1.5" filter="url(#glb)"/>
        <!-- base lead from right -->
        <line x1="546" y1="260" x2="532" y2="260" stroke="rgba(10,124,140,0.55)" stroke-width="1.5"/>
        <!-- vertical bar on right side -->
        <line x1="532" y1="246" x2="532" y2="274" stroke="rgba(10,124,140,0.55)" stroke-width="2"/>
        <!-- collector: bar→upper-left, then up -->
        <line x1="532" y1="250" x2="512" y2="236" stroke="rgba(10,124,140,0.55)" stroke-width="1.5"/>
        <line x1="512" y1="236" x2="512" y2="226" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <!-- emitter: bar→lower-left, arrow, then down -->
        <line x1="532" y1="270" x2="512" y2="284" stroke="rgba(10,124,140,0.55)" stroke-width="1.5"/>
        <line x1="512" y1="284" x2="512" y2="294" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <!-- arrow on emitter pointing lower-left -->
        <polygon points="517,280 512,284 516,289" fill="rgba(10,124,140,0.65)"/>
        <!-- trace connection to center on left -->
        <line x1="486" y1="260" x2="468" y2="260" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <!-- label -->
        <text x="516" y="254" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#ffffff" font-weight="700" letter-spacing="1" font-family="'Share Tech Mono',monospace">GATHERING /</text>
        <text x="516" y="268" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#ffffff" font-weight="700" letter-spacing="1" font-family="'Share Tech Mono',monospace">SHARING</text>
      </g>
      <!-- DISCUSSING — Crystal, bottom -->
      <g class="nd" id="nd-discussing" onclick="activateNode('discussing')">
        <rect x="286" y="370" width="88" height="32" rx="3" fill="#071515" stroke="rgba(10,124,140,0.4)" stroke-width="1.2"/>
        <rect class="nhalo" id="h-discussing" x="281" y="365" width="98" height="42" rx="5" fill="none" stroke="#0a7c8c" stroke-width="1.5" filter="url(#glb)"/>
        <line x1="304" y1="365" x2="304" y2="407" stroke="rgba(10,124,140,0.6)" stroke-width="2"/>
        <line x1="356" y1="365" x2="356" y2="407" stroke="rgba(10,124,140,0.6)" stroke-width="2"/>
        <line x1="286" y1="386" x2="272" y2="386" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="374" y1="386" x2="388" y2="386" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="330" y1="370" x2="330" y2="367" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <text x="330" y="386" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#ffffff" font-weight="700" letter-spacing="1" font-family="'Share Tech Mono',monospace">DISCUSSING</text>
      </g>

const SIDE_ANGLES = {
  'right':        90,
  'bottom-right': 135,
  'bottom':       180,
  'bottom-left':  225,
  'left':         270,
  'top-left':     315,
  'top':          0,

const THEME_ANGLE  = 45;   // theme btn: top-right of inner orbit
const INNER_SCALE  = 1.44; // theme button orbit (25% bigger node + 15% further out)

function vbToScreen(vbX, vbY) {
  const svgEl = document.querySelector('.view:not(.hidden) svg');
  if (!svgEl) return null;
  try {
    const pt = svgEl.createSVGPoint();
    pt.x = vbX; pt.y = vbY;
    const ctm = svgEl.getScreenCTM();
    if (!ctm) return null;
    const sp = pt.matrixTransform(ctm);
    const wr = document.getElementById('wrap').getBoundingClientRect();
    return { x: sp.x - wr.left, y: sp.y - wr.top };
  } catch(e) { return null; }
}

function orbitPoint(angleDeg, scale) {
  // 0=top, clockwise. Convert to standard math angle (0=right, CCW).
  const rad = (angleDeg - 90) * Math.PI / 180;
  const r   = VB_R * scale;
  return vbToScreen(
    VB_CX + r * Math.cos(rad),
    VB_CY + r * Math.sin(rad)
  );
}

function placeBtn(btn, angleDeg, scale) {
  const pos = orbitPoint(angleDeg, scale);
  if (!pos) return;
  btn.style.left = pos.x + 'px';
  btn.style.top  = pos.y + 'px';
}

// ── Store original SVG attribute values ONCE on first load ──
// We snapshot every relevant SVG element so applyTheme always
// works from the originals, not from whatever the last theme set.
let svgSnapshot = null;

function snapshotSVG() {
  svgSnapshot = [];
  document.querySelectorAll('svg *').forEach((el, i) => {
    el.dataset.snapIdx = i;
    const snap = { idx: i, tag: el.tagName };
    ['fill','stroke','r'].forEach(a => {
      const v = el.getAttribute(a);
      if (v !== null) snap[a] = v;
    });
    snap.classList = [...el.classList];
    svgSnapshot.push(snap);
  });
}

function applyTheme(t) {
  // Snapshot originals on first theme change
  if (!svgSnapshot) snapshotSVG();

  // Backgrounds
  document.body.style.background = t.bg;
  document.querySelector('.wrap').style.background = t.bg;

  // Grid
  let gs = document.getElementById('dyn-grid');
  if (!gs) { gs = document.createElement('style'); gs.id = 'dyn-grid'; document.head.appendChild(gs); }
  gs.textContent = `.wrap::before{background-image:linear-gradient(${t.grid} 1px,transparent 1px),linear-gradient(90deg,${t.grid} 1px,transparent 1px)!important}`;

  // Corners
  document.querySelectorAll('.corner').forEach(c => c.style.borderColor = t.brd);

  // Walk the snapshot — remap from original values
  svgSnapshot.forEach(snap => {
    const el = document.querySelector(`[data-snap-idx="${snap.idx}"]`);
    if (!el) return;
    const cls = snap.classList || [];
    const origFill   = snap.fill   || '';
    const origStroke = snap.stroke || '';
    const r = parseFloat(snap.r || '0');

    // nhalo rings
    if (cls.includes('nhalo')) { el.setAttribute('stroke', t.acc); return; }

    // Polylines (traces)
    if (snap.tag === 'polyline') {
      if (!el.classList.contains('lit')) el.setAttribute('stroke', t.tr_c);
      return;
    }

    // Junction dots — small circles with rgba fill
    if (snap.tag === 'circle' && r <= 4 && origFill.startsWith('rgba')) {
      el.setAttribute('fill', t.jc); return;
    }

    // Outer dashed ring — large circle, fill=none
    if (snap.tag === 'circle' && r >= 50 && origFill === 'none') {
      el.setAttribute('stroke', t.brd); return;
    }

    // Main pad circles (r=46,38) and component body circles (r=30 transistor)
    if (snap.tag === 'circle' && r >= 28 && origFill.match(/^#0[0-9a-f]/i)) {
      // Large pad: stroke gets accent; inner dark: no stroke change
      if (r >= 44) { el.setAttribute('stroke', t.acc); el.setAttribute('fill', t.bg2); }
      else if (r >= 36) { el.setAttribute('stroke', t.acc); el.setAttribute('fill', t.bg3); }
      else { el.setAttribute('fill', t.bg2); if (origStroke && origStroke.startsWith('rgba')) el.setAttribute('stroke', t.ns); }
      return;
    }

    // Rects (node bodies)
    if (snap.tag === 'rect') {
      if (origFill.match(/^#0[0-9a-f]/i)) el.setAttribute('fill', t.bg2);
      if (origStroke.startsWith('rgba'))   el.setAttribute('stroke', t.ns);
      return;
    }

    // Lines (pins, plates)
    if (snap.tag === 'line') {
      if (origStroke.startsWith('rgba')) el.setAttribute('stroke', t.ns);
      return;
    }

    // Paths (coils, transistor)
    if (snap.tag === 'path') {
      if (origStroke.startsWith('rgba')) el.setAttribute('stroke', t.ns);
      return;
    }

    // Polygon (transistor arrow)
    if (snap.tag === 'polygon') { el.setAttribute('fill', t.ns); return; }

    // Text
    if (snap.tag === 'text') {
      if (origFill === '#ffffff') return; // white node labels stay white
      if (origFill === 'none')   return;
      // Teal-ish text → main text color
      if (origFill === '#5ec8d4' || origFill.startsWith('rgba(94,200')) {
        el.setAttribute('fill', t.tx); return;
      }
      // Sub text
      if (origFill.startsWith('rgba')) { el.setAttribute('fill', t.txs); return; }
      // Flavor VCC/GND text
      if (origFill.startsWith('rgba') || origFill === '#5ec8d4') {
        el.setAttribute('fill', t.txs);
      }
      return;
    }
  });

  // Set panel CSS vars on root so all panels update
  const r = document.documentElement;
  r.style.setProperty('--sp-bg',   t.pBg);
  r.style.setProperty('--sp-bd',   t.pBd);
  r.style.setProperty('--sp-hbg',  t.hBg);
  r.style.setProperty('--sp-hbd',  t.hBd);
  r.style.setProperty('--sp-tx',   t.tx);
  r.style.setProperty('--sp-acc',  t.ns);
  r.style.setProperty('--sp-desc', t.desc);
  r.style.setProperty('--sp-link', t.acc);
  r.style.setProperty('--sp-ibg',  t.iBg);
  r.style.setProperty('--sp-ph',   t.ph);

  // Dynamic styles for lit traces, button hovers
  let ts = document.getElementById('dyn-tr');
  if (!ts) { ts = document.createElement('style'); ts.id = 'dyn-tr'; document.head.appendChild(ts); }
  ts.textContent = `
    .tr.lit{stroke:${t.acc}!important;filter:drop-shadow(0 0 4px ${t.glow})!important}
    #backArrow{border-color:${t.acc}!important;color:${t.acc}!important}
    #backArrow:hover{background:${t.acc}!important;color:#fff!important}
    .p-close:hover,.p-more:hover{background:${t.acc}!important;color:#fff!important}
  `;

  // Panel colors now handled by CSS vars (--sp-*) set above

  // Swatch
  const sw = document.getElementById('themeSwatch');
  if (t.rainbow) { sw.classList.add('rainbow'); sw.style.background = ''; }
  else { sw.classList.remove('rainbow'); sw.style.background = t.swatch; }

  // Reposition orbit buttons since theme may affect layout
  requestAnimationFrame(positionAllOrbitBtns);
}

// ── RAINBOW PAGE ANIMATION ───────────────────────────
let rainbowFrame = null;
let rainbowHue   = 0;

// The six color "roles" we animate simultaneously
// Each maps to an SVG element category or UI color
function rainbowTick() {
  rainbowHue = (rainbowHue + 0.08) % 360; // very slow — full cycle ~75 seconds
  const h = rainbowHue;

  // Derive accent, text, trace from the hue
  const acc  = `hsl(${h}, 70%, 45%)`;
  const tx   = `hsl(${h}, 60%, 72%)`;
  const txs  = `hsla(${h}, 60%, 72%, 0.5)`;
  const tr_c = `hsla(${h}, 65%, 40%, 0.22)`;
  const ns   = `hsla(${h}, 65%, 40%, 0.45)`;
  const jc   = `hsla(${h}, 65%, 40%, 0.35)`;
  const brd  = `hsla(${h}, 50%, 35%, 0.35)`;
  const glow = `hsla(${h}, 70%, 45%, 0.7)`;
  const grid = `hsla(${h}, 50%, 30%, 0.07)`;
  const pBd  = `hsla(${h}, 60%, 40%, 0.5)`;
  const hBg  = `hsla(${h}, 60%, 35%, 0.15)`;
  const hBd  = `hsla(${h}, 60%, 40%, 0.4)`;
  const iBd  = `hsla(${h}, 60%, 40%, 0.4)`;
  const ph   = `hsla(${h}, 60%, 40%, 0.5)`;

  // Background: very dark, barely tinted
  const bgH  = (h + 180) % 360; // complement for bg
  document.body.style.background = `hsl(${bgH}, 25%, 4%)`;
  document.querySelector('.wrap').style.background = `hsl(${bgH}, 25%, 4%)`;

  // Grid
  let gs = document.getElementById('dyn-grid');
  if (gs) gs.textContent = `.wrap::before{background-image:linear-gradient(${grid} 1px,transparent 1px),linear-gradient(90deg,${grid} 1px,transparent 1px)!important}`;

  // Corners
  document.querySelectorAll('.corner').forEach(c => c.style.borderColor = brd);

  // SVG elements via snapshot
  if (svgSnapshot) {
    svgSnapshot.forEach(snap => {
      const el = document.querySelector(`[data-snap-idx="${snap.idx}"]`);
      if (!el) return;
      const cls  = snap.classList || [];
      const origFill   = snap.fill   || '';
      const origStroke = snap.stroke || '';
      const r = parseFloat(snap.r || '0');

      if (cls.includes('nhalo'))                                       { el.setAttribute('stroke', acc); return; }
      if (snap.tag === 'polyline' && !el.classList.contains('lit'))   { el.setAttribute('stroke', tr_c); return; }
      if (snap.tag === 'circle'  && r <= 4  && origFill.startsWith('rgba')) { el.setAttribute('fill', jc); return; }
      if (snap.tag === 'circle'  && r >= 50 && origFill === 'none')  { el.setAttribute('stroke', brd); return; }
      if (snap.tag === 'circle'  && r >= 28 && origFill.match(/^#0[0-9a-f]/i)) {
        if (r >= 44) { el.setAttribute('stroke', acc); el.setAttribute('fill', `hsl(${bgH},25%,5%)`); }
        else if (r >= 36) { el.setAttribute('stroke', acc); el.setAttribute('fill', `hsl(${bgH},25%,8%)`); }
        else { el.setAttribute('fill', `hsl(${bgH},25%,5%)`); if (origStroke && origStroke.startsWith('rgba')) el.setAttribute('stroke', ns); }
        return;
      }
      if (snap.tag === 'rect') {
        if (origFill.match(/^#0[0-9a-f]/i))  el.setAttribute('fill', `hsl(${bgH},25%,5%)`);
        if (origStroke.startsWith('rgba'))    el.setAttribute('stroke', ns);
        return;
      }
      if (snap.tag === 'line')    { if (origStroke.startsWith('rgba')) el.setAttribute('stroke', ns); return; }
      if (snap.tag === 'path')    { if (origStroke.startsWith('rgba')) el.setAttribute('stroke', ns); return; }
      if (snap.tag === 'polygon') { el.setAttribute('fill', ns); return; }
      if (snap.tag === 'text') {
        if (origFill === '#ffffff') return;
        if (origFill === 'none')    return;
        if (origFill === '#5ec8d4' || origFill.startsWith('rgba(94,200')) { el.setAttribute('fill', tx); return; }
        if (origFill.startsWith('rgba')) { el.setAttribute('fill', txs); return; }
      }
    });
  }

  // Lit traces
  let ts = document.getElementById('dyn-tr');
  if (ts) ts.textContent = `
    .tr.lit{stroke:${acc}!important;filter:drop-shadow(0 0 4px ${glow})!important}
    #backArrow{border-color:${acc}!important;color:${acc}!important}
    #backArrow:hover{background:${acc}!important;color:#fff!important}
    .p-close:hover,.p-more:hover{background:${acc}!important;color:#fff!important}
  `;

  // Panel + sub-panel via CSS vars
  const descColor = `hsla(${h},40%,85%,0.9)`;
  const rr = document.documentElement;
  rr.style.setProperty('--sp-bg',   `hsl(${bgH},25%,4%)`);
  rr.style.setProperty('--sp-bd',   pBd);
  rr.style.setProperty('--sp-hbg',  hBg);
  rr.style.setProperty('--sp-hbd',  hBd);
  rr.style.setProperty('--sp-tx',   tx);
  rr.style.setProperty('--sp-acc',  ns);
  rr.style.setProperty('--sp-desc', descColor);
  rr.style.setProperty('--sp-link', acc);
  rr.style.setProperty('--sp-ibg',  `hsl(${bgH},25%,5%)`);
  rr.style.setProperty('--sp-ph',   ph);

  // Keep swatch in sync with page hue
  const sw = document.getElementById('themeSwatch');
  if (sw) { sw.style.background = `hsl(${h}, 70%, 55%)`; sw.style.animation = 'none'; }

  rainbowFrame = requestAnimationFrame(rainbowTick);
}

function startRainbow() {
  if (rainbowFrame) return;
  rainbowTick();
}

function stopRainbow() {
  if (rainbowFrame) { cancelAnimationFrame(rainbowFrame); rainbowFrame = null; }
}

function cycleTheme() {
  themeIndex = (themeIndex + 1) % THEMES.length;
  const t = THEMES[themeIndex];
  if (t.rainbow) { stopRainbow(); startRainbow(); } // rainbowTick owns all styling
  else           { stopRainbow(); applyTheme(t); }
}

// Init swatch
document.getElementById('themeSwatch').style.background = THEMES[0].swatch;
requestAnimationFrame(() => requestAnimationFrame(positionAllOrbitBtns));

function activateCenter() {
  if (inSub) return;
  if (activeId === '__center') { closePanel(); return; }
  activeId = '__center';
  clearTraces();
  document.getElementById('h-center').classList.add('on');
  document.getElementById('pHeaderTitle').textContent = about.title;
  document.getElementById('pDesc').textContent = about.desc;
  document.getElementById('pMore').style.display = 'none';
  // Add CV link to about desc
  const descEl = document.getElementById('pDesc');
  descEl.innerHTML = about.desc.replace(/\n/g, '<br>') +
    `<br><br>` +
    (about.cv ? `<a href="${about.cv}" target="_blank" class="cv-link">VIEW CV →</a>` : '') +
    (about.linkedin ? `<a href="${about.linkedin}" target="_blank" class="social-btn" title="LinkedIn"><img src="assets/linkedin.png" alt="LinkedIn"></a>` : '') +
    (about.instagram ? `<a href="${about.instagram}" target="_blank" class="social-btn" title="Instagram"><img src="assets/instagram.png" alt="Instagram"></a>` : '');
  setImage(about.img);
  document.getElementById('panel').classList.add('vis');
}

function activateNode(id) {
  if (inSub) return;
  if (activeId === id) { closePanel(); return; }
  activeId = id;
  clearTraces();
  const n = nodes[id];
  n.traces.forEach(tid => {
    const el = document.getElementById(tid);
    if (el) el.classList.add('lit');
  });
  const h = document.getElementById('h-' + id);
  if (h) h.classList.add('on');
  document.getElementById('pHeaderTitle').textContent = n.title;
  document.getElementById('pDesc').textContent = n.desc;
  document.getElementById('pMore').style.display = 'inline-block';
  setImage(n.img);
  document.getElementById('panel').classList.add('vis');
}

function makeImg(src, extraStyle) {
  const wrap = document.createElement('div');
  wrap.className = 'sub-panel-img';
  if (extraStyle) wrap.style.cssText = extraStyle;
  const tryImg = new Image();
  tryImg.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block';
  tryImg.onload  = () => wrap.appendChild(tryImg);
  tryImg.onerror = () => { wrap.innerHTML = `<div class="sub-panel-img-ph">[ ${src} ]</div>`; };
  tryImg.src = src;
  return wrap;
}

function openSubPanel(item) {
  const inner = document.getElementById('subPanelInner');
  inner.innerHTML = '';

  // Embed (iframe: youtube / archive)
  if (item.embed) {
    const wrap = document.createElement('div');
    wrap.className = 'sub-panel-embed';
    wrap.innerHTML = `<iframe src="${item.embed}" allowfullscreen loading="lazy"></iframe>`;
    inner.appendChild(wrap);
  }

  // Local video — gif-style (autoplay, muted, loop, fixed 150x150)
  if (item.localvideo) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;justify-content:center;padding:4px 0';
    const vid = document.createElement('video');
    vid.src = item.localvideo;
    vid.autoplay = true;
    vid.muted = true;
    vid.loop = true;
    vid.playsInline = true;
    vid.style.cssText = 'width:150px;height:150px;object-fit:cover;border-radius:6px;display:block';
    wrap.appendChild(vid);
    inner.appendChild(wrap);
  }

  // Single image (above body text)
  if (item.img) {
    inner.appendChild(makeImg(item.img));
  }

  // Pair of images side by side
  if (item.imgPair) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:8px;width:100%';
    item.imgPair.forEach(src => {
      const wrap = makeImg(src, 'flex:1 1 0;min-width:0;height:140px');
      row.appendChild(wrap);
    });
    inner.appendChild(row);
  }

  // Body text — strip redundant external "Watch here" link if embed/localvideo present
  if (item.body) {
    let bodyHTML = item.body.split('\n').join('<br>');
    if (item.embed || item.localvideo) {
      const parts = bodyHTML.split('<br><br>');
      if (parts.length > 1 && parts[parts.length - 1].trim().startsWith('<a ') &&
          /watch|view|listen/i.test(parts[parts.length - 1])) {
        parts.pop();
        bodyHTML = parts.join('<br><br>');
      }
    }
    const txt = document.createElement('div');
    txt.className = 'sub-panel-text';
    txt.innerHTML = bodyHTML;
    inner.appendChild(txt);
  }

  // Image below text (e.g. Colour Organ)
  if (item.imgBelow) {
    inner.appendChild(makeImg(item.imgBelow));
  }

  document.getElementById('subPanelTitle').textContent = item.l;
  document.getElementById('subPanel').classList.add('vis');
}

function closeSubPanel() {
  const sp = document.getElementById('subPanel');
  sp.classList.remove('vis');
  // Clear embeds to stop video playback
  document.querySelectorAll('.sub-panel-embed iframe').forEach(f => { f.src = f.src; });
}

// Layout positions for sub-nodes by count
// Each layout is an array of {x,y,tx,ty} for node placement
// Node rect is 96w x 36h, so center x offset = 48, y offset = 18
const SUB_LAYOUTS = {
  // 1 item: top only
  1: [
    { rx:282, ry:74,  tx:330, ty:92,  trEnd:'330,214 330,110' }
  ],
  // 2 items: left + right
  2: [
    { rx:82,  ry:242, tx:130, ty:260, trEnd:'284,260 178,260' },
    { rx:482, ry:242, tx:530, ty:260, trEnd:'376,260 482,260' }
  ],
  // 3 items: top + left + right  (no bottom)
  3: [
    { rx:282, ry:74,  tx:330, ty:92,  trEnd:'330,214 330,110' },
    { rx:82,  ry:242, tx:130, ty:260, trEnd:'284,260 178,260' },
    { rx:482, ry:242, tx:530, ty:260, trEnd:'376,260 482,260' }
  ],
  // 4 items: top + left + right + bottom
  4: [
    { rx:282, ry:74,  tx:330, ty:92,  trEnd:'330,214 330,110' },
    { rx:82,  ry:242, tx:130, ty:260, trEnd:'284,260 178,260' },
    { rx:482, ry:242, tx:530, ty:260, trEnd:'376,260 482,260' },
    { rx:282, ry:410, tx:330, ty:428, trEnd:'330,306 330,410' }
  ],
  // 5 items: top + left + right + bottom + top-right
  5: [
    { rx:282, ry:74,  tx:330, ty:92,  trEnd:'330,214 330,110' },
    { rx:82,  ry:242, tx:130, ty:260, trEnd:'284,260 178,260' },
    { rx:482, ry:242, tx:530, ty:260, trEnd:'376,260 482,260' },
    { rx:282, ry:410, tx:330, ty:428, trEnd:'330,306 330,410' },
    { rx:472, ry:74,  tx:520, ty:92,  trEnd:'376,214 472,92' }
  ],
  // 6 items: 5 + top-left
  6: [
    { rx:282, ry:74,  tx:330, ty:92,  trEnd:'330,214 330,110' },
    { rx:82,  ry:242, tx:130, ty:260, trEnd:'284,260 178,260' },
    { rx:482, ry:242, tx:530, ty:260, trEnd:'376,260 482,260' },
    { rx:282, ry:410, tx:330, ty:428, trEnd:'330,306 330,410' },
    { rx:472, ry:74,  tx:520, ty:92,  trEnd:'376,214 472,92'  },
    { rx:92,  ry:74,  tx:140, ty:92,  trEnd:'284,214 188,92'  }
  ],
  // 7 items: 6 + bottom-right
  7: [
    { rx:282, ry:74,  tx:330, ty:92,  trEnd:'330,214 330,110' },
    { rx:82,  ry:242, tx:130, ty:260, trEnd:'284,260 178,260' },
    { rx:482, ry:242, tx:530, ty:260, trEnd:'376,260 482,260' },
    { rx:282, ry:410, tx:330, ty:428, trEnd:'330,306 330,410' },
    { rx:472, ry:74,  tx:520, ty:92,  trEnd:'376,214 472,92'  },
    { rx:92,  ry:74,  tx:140, ty:92,  trEnd:'284,214 188,92'  },
    { rx:472, ry:410, tx:520, ty:428, trEnd:'376,306 472,410' }
  ]
};

const NS = 'http://www.w3.org/2000/svg';

function buildSubBoard(s) {
  const svg = document.getElementById('svgSub');
  if (!svg) { console.error('svgSub not found'); return; }
  // Remove old dynamic content (keep defs)
  [...svg.children].forEach(c => { if (c.tagName !== 'defs') svg.removeChild(c); });

  const items = s.items;
  const count = Math.min(items.length, 7);
  const layout = SUB_LAYOUTS[count] || SUB_LAYOUTS[4];

  // Center node
  const acc = '#0a7c8c'; // will get re-themed after snapshot
  function svgEl(tag, attrs) {
    const el = document.createElementNS(NS, tag);
    Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
    return el;
  }

  svg.appendChild(svgEl('circle', {cx:330,cy:260,r:46,fill:'#071515',stroke:acc,'stroke-width':1.5,filter:'url(#gl2)'}));
  svg.appendChild(svgEl('circle', {cx:330,cy:260,r:38,fill:'#0a1e1e'}));
  const cLabel = svgEl('text', {x:330,y:260,'text-anchor':'middle','dominant-baseline':'central','font-size':14,fill:'#5ec8d4','letter-spacing':1,'font-family':"'Share Tech Mono',monospace"});
  cLabel.id = 'subCenterLabel';
  cLabel.textContent = s.center;
  svg.appendChild(cLabel);

  // Traces + nodes
  layout.forEach((pos, i) => {
    const item = items[i];
    // Trace
    const tr = svgEl('polyline', {class:'tr',points:pos.trEnd,fill:'none',stroke:'rgba(10,124,140,0.18)','stroke-width':2,'stroke-linecap':'square'});
    svg.appendChild(tr);
    // Node group
    const g = svgEl('g', {id:'sub-n'+(i+1),cursor:'pointer'});
    g.classList.add('sub-nd');
    const r = svgEl('rect', {x:pos.rx,y:pos.ry,width:96,height:36,rx:3,fill:'#071515',stroke:'rgba(10,124,140,0.35)','stroke-width':1,filter:'url(#glb2)'});
    const t = svgEl('text', {id:'sub-l'+(i+1),x:pos.tx,y:pos.ty,'text-anchor':'middle','dominant-baseline':'central','font-size':12,fill:'#ffffff','font-weight':700,'font-family':"'Share Tech Mono',monospace"});
    t.textContent = item.l;
    g.appendChild(r); g.appendChild(t);
    g.addEventListener('click', () => openSubPanel(item));
    // Hover effect
    g.addEventListener('mouseenter', () => r.setAttribute('stroke','rgba(10,124,140,0.8)'));
    g.addEventListener('mouseleave', () => r.setAttribute('stroke','rgba(10,124,140,0.35)'));
    svg.appendChild(g);
  });

  // Re-snapshot after building so theme system picks up new elements
  svgSnapshot = null;
}

function drillIn() {
  if (!activeId || activeId === '__center') return;
  const n = nodes[activeId], s = n.sub;
  buildSubBoard(s);

  // Writing links (top-left corner bullets for making_thinking)
  const wl = document.getElementById('writingLinks');
  if (n.writingLinks && n.writingLinks.length) {
    wl.innerHTML = '<div class="writing-links-label">WRITING</div>' +
      n.writingLinks.map(lk =>
        `<a href="${lk.url}" target="_blank">${lk.label}</a>`
      ).join('');
    wl.classList.add('vis');
  } else {
    wl.innerHTML = '';
    wl.classList.remove('vis');
  }

  const trace = document.getElementById(n.traces[0]);
  if (trace) trace.classList.add('lit');
  setTimeout(() => {
    const main = document.getElementById('viewMain');
    const sub  = document.getElementById('viewSub');
    main.style.opacity = '0'; main.style.transition = 'opacity 0.35s';
    setTimeout(() => {
      main.classList.add('hidden');
      sub.classList.remove('hidden');
      sub.style.opacity = '0'; sub.style.transition = 'opacity 0.35s';
      requestAnimationFrame(() => requestAnimationFrame(() => { sub.style.opacity = '1'; }));
      inSub = true;
      const btn = document.getElementById('backArrow');
      btn.textContent = n.backPos.arrow;
      positionBackArrow(n.backPos.side);
      btn.classList.add('vis');
      closePanel();
    }, 350);
  }, 280);
}

function goHome() {
  closeSubPanel();
  const main = document.getElementById('viewMain');
  const sub  = document.getElementById('viewSub');
  sub.style.opacity = '0'; sub.style.transition = 'opacity 0.3s';
  setTimeout(() => {
    sub.classList.add('hidden');
    main.classList.remove('hidden');
    main.style.opacity = '0'; main.style.transition = 'opacity 0.3s';
    requestAnimationFrame(() => requestAnimationFrame(() => { main.style.opacity = '1'; }));
    inSub = false; activeId = null; currentSide = null;
    document.getElementById('backArrow').classList.remove('vis');

    clearTraces();
  }, 300);
}
