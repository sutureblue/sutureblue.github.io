<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Bee Nix // Suture Blue</title>
  <link rel="icon" href="assets/favicon.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #050f0f;
      overflow: hidden;
    }

    body {
      font-family: 'Share Tech Mono', monospace;
      user-select: none;
    }

    /* ── WRAP (full viewport) ─────────────────────────── */
    .wrap {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: #050f0f;
    }

    .wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(10,124,140,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(10,124,140,0.06) 1px, transparent 1px);
      background-size: 22px 22px;
      pointer-events: none;
    }

    /* corner marks */
    .corner {
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: rgba(10,124,140,0.3);
      border-style: solid;
      border-width: 0;
    }
    .corner.tl { top: 10px; left: 10px; border-top-width: 1.5px; border-left-width: 1.5px; }
    .corner.tr { top: 10px; right: 10px; border-top-width: 1.5px; border-right-width: 1.5px; }
    .corner.bl { bottom: 10px; left: 10px; border-bottom-width: 1.5px; border-left-width: 1.5px; }
    .corner.br { bottom: 10px; right: 10px; border-bottom-width: 1.5px; border-right-width: 1.5px; }

    /* ── ORBIT BUTTONS ───────────────────────────────────── */
    .orbit-btn {
      position: absolute;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 30;
      font-family: 'Share Tech Mono', monospace;
      transform: translate(-50%, -50%);
      pointer-events: auto;
      transition: background 0.18s, color 0.18s, border-color 0.18s,
                  width 0.18s, height 0.18s, font-size 0.18s;
    }

    /* Nav arrow — white fill, sized by JS, below panels */
    #backArrow {
      background: #ffffff;
      border: 2px solid #0a7c8c;
      color: #0a7c8c;
      font-size: 22px;
      width: 44px;
      height: 44px;
      display: none;
      z-index: 15;
      line-height: 1;
      padding: 0;
    }
    #backArrow.vis { display: flex; }
    #backArrow:hover { background: #0a7c8c; color: #ffffff; }

    /* Theme button — no background, just a swatch dot, always on top */
    #themeBtn {
      background: none;
      border: none;
      width: 22px;
      height: 22px;
      display: flex;
      padding: 0;
      z-index: 40;
    }
    .theme-swatch {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.35);
      background: #0a7c8c;
      pointer-events: none;
      transition: border-color 0.2s, opacity 0.2s, width 0.18s, height 0.18s;
      opacity: 0.3;
    }
    #themeBtn:hover .theme-swatch { border-color: rgba(255,255,255,0.8); opacity: 0.7; }

    @keyframes rainbow-spin {
      0%   { background: hsl(0,70%,60%); }
      14%  { background: hsl(50,80%,58%); }
      28%  { background: hsl(110,65%,48%); }
      42%  { background: hsl(170,70%,48%); }
      57%  { background: hsl(220,70%,62%); }
      71%  { background: hsl(270,65%,60%); }
      85%  { background: hsl(320,70%,58%); }
      100% { background: hsl(360,70%,60%); }
    }
    .theme-swatch.rainbow { animation: rainbow-spin 3s linear infinite; }

    /* ── VIEWS ────────────────────────────────────────── */
    .view {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.35s;
    }
    .view.hidden { opacity: 0; pointer-events: none; }
    .view svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── SVG INTERACTIVITY ────────────────────────────── */
    .nd { cursor: pointer; }
    .nd:hover .nhalo { opacity: 1; }
    .nhalo { opacity: 0; transition: opacity 0.2s; }
    .tr { transition: stroke 0.4s, stroke-opacity 0.4s, filter 0.4s; }
    .tr.lit {
      stroke: #0a7c8c;
      stroke-opacity: 1;
      filter: drop-shadow(0 0 4px rgba(10,124,140,0.7));
    }

    /* ── PANEL ────────────────────────────────────────── */
    .panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% - 80px);
      max-width: 480px;
      max-height: calc(100% - 60px);
      background: var(--sp-bg, rgba(4,14,14,0.98));
      border: 1px solid var(--sp-bd, rgba(10,124,140,0.5));
      border-radius: 10px;
      overflow: hidden;
      display: none;
      flex-direction: column;
      z-index: 20;
    }
    .panel.vis {
      display: flex;
      animation: pop 0.2s ease forwards;
    }
    @keyframes pop {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.97); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    .p-header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--sp-hbg, rgba(10,124,140,0.15));
      border-bottom: 1px solid var(--sp-hbd, rgba(10,124,140,0.4));
      padding: 9px 12px;
    }
    .p-header-title {
      font-size: 13px;
      letter-spacing: 3px;
      color: var(--sp-tx, rgba(94,200,212,0.95));
      font-weight: 700;
    }
    .p-close {
      background: #ffffff;
      border: 2px solid var(--sp-link, #0a7c8c);
      border-radius: 4px;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--sp-link, #0a7c8c);
      font-size: 13px;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      line-height: 1;
      padding: 0;
      transition: background 0.18s, color 0.18s;
      flex-shrink: 0;
    }
    .p-close:hover { background: var(--sp-link, #0a7c8c); color: #ffffff; }

    .panel-body {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--sp-acc, rgba(10,124,140,0.4)) transparent;
    }
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--sp-acc, rgba(10,124,140,0.4)); border-radius: 2px; }

    .panel-inner { display: flex; gap: 14px; align-items: flex-start; }
    .panel-text  { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; }

    .p-desc {
      font-size: 13px;
      color: var(--sp-desc, rgba(180,225,220,0.9));
      line-height: 1.7;
      letter-spacing: 0.3px;
    }
    .p-more {
      align-self: flex-start;
      margin-top: 12px;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--sp-link, #0a7c8c);
      background: #ffffff;
      border: 2px solid var(--sp-link, #0a7c8c);
      border-radius: 4px;
      padding: 5px 12px;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      transition: background 0.18s, color 0.18s;
      white-space: nowrap;
    }
    .p-more:hover { background: var(--sp-link, #0a7c8c); color: #ffffff; }

    .panel-img {
      flex: 0 0 auto;
      width: clamp(100px, 28%, 160px);
      min-height: 130px;
      max-height: 200px;
      align-self: stretch;
      border-radius: 6px;
      border: 1px solid var(--sp-bd, rgba(10,124,140,0.4));
      background: var(--sp-ibg, #0a1e1e);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .panel-img img  { width: 100%; height: 100%; object-fit: cover; display: block; }
    .img-ph {
      font-size: 10px;
      color: var(--sp-ph, rgba(10,124,140,0.5));
      text-align: center;
      letter-spacing: 1px;
      line-height: 2;
      padding: 10px;
    }

    /* ── SUB-ITEM PANEL (detail panel for sub-nodes) ───── */
    .sub-panel {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% - 60px);
      max-width: 520px;
      max-height: calc(100% - 60px);
      background: var(--sp-bg, rgba(4,14,14,0.98));
      border: 1px solid var(--sp-bd, rgba(10,124,140,0.5));
      border-radius: 10px;
      overflow: hidden;
      display: none;
      flex-direction: column;
      z-index: 25;
    }
    .sub-panel.vis { display: flex; animation: pop 0.2s ease forwards; }
    .sub-panel .p-header { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; background: var(--sp-hbg, rgba(10,124,140,0.15)); border-bottom: 1px solid var(--sp-hbd, rgba(10,124,140,0.4)); padding: 9px 12px; }
    .sub-panel .p-header-title { font-size: 12px; letter-spacing: 2px; color: var(--sp-tx, rgba(94,200,212,0.95)); font-weight: 700; }
    .sub-panel-body { flex: 1 1 auto; overflow-y: auto; padding: 16px; scrollbar-width: thin; scrollbar-color: var(--sp-acc, rgba(10,124,140,0.4)) transparent; }
    .sub-panel-body::-webkit-scrollbar { width: 4px; }
    .sub-panel-body::-webkit-scrollbar-thumb { background: var(--sp-acc, rgba(10,124,140,0.4)); border-radius: 2px; }
    .sub-panel-inner { display: flex; flex-direction: column; gap: 14px; }
    .sub-panel-text { font-size: 12px; color: var(--sp-desc, rgba(180,225,220,0.9)); line-height: 1.7; letter-spacing: 0.3px; }
    .sub-panel-text a { color: var(--sp-link, #0a7c8c); text-decoration: none; border-bottom: 1px solid var(--sp-bd, rgba(10,124,140,0.4)); }
    .sub-panel-text a:hover { color: var(--sp-tx, #5ec8d4); }
    .sub-panel-img { width: 100%; max-height: 180px; border-radius: 6px; border: 1px solid var(--sp-bd, rgba(10,124,140,0.35)); background: var(--sp-ibg, #0a1e1e); overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .sub-panel-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .sub-panel-embed { width: 100%; aspect-ratio: 16/9; border-radius: 6px; overflow: hidden; border: 1px solid var(--sp-bd, rgba(10,124,140,0.35)); background: #000; }
    .sub-panel-embed iframe { width: 100%; height: 100%; border: none; display: block; }
    .sub-panel-img-ph { font-size: 10px; color: var(--sp-ph, rgba(10,124,140,0.5)); text-align: center; letter-spacing: 1px; padding: 20px; }

    /* sub-board node hover */
    .sub-nd { cursor: pointer; }
    .sub-nd rect { transition: opacity 0.15s; }

    /* about CV link */
    .cv-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: #0a7c8c;
      background: #ffffff;
      border: 2px solid #0a7c8c;
      border-radius: 4px;
      padding: 4px 10px;
      text-decoration: none;
      font-family: 'Share Tech Mono', monospace;
      transition: background 0.18s, color 0.18s;
    }
    .cv-link:hover { background: #0a7c8c; color: #ffffff; }

    /* ── WRITING LINKS (sub-board corner bullets) ──────── */
    .writing-links {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 10;
      display: none;
      flex-direction: column;
      gap: 5px;
    }
    .writing-links.vis { display: flex; }
    .writing-links a {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--sp-link, #0a7c8c);
      text-decoration: none;
      font-family: 'Share Tech Mono', monospace;
      border-bottom: 1px solid var(--sp-bd, rgba(10,124,140,0.3));
      transition: color 0.15s;
      line-height: 1.6;
    }
    .writing-links a::before { content: "· "; opacity: 0.6; }
    .writing-links a:hover { color: var(--sp-tx, #5ec8d4); }
    .writing-links-label {
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--sp-ph, rgba(10,124,140,0.5));
      font-family: 'Share Tech Mono', monospace;
      margin-bottom: 2px;
    }

    /* ── SOCIAL ICON BUTTONS ────────────────────────── */
    .social-btn {
      display: inline-block;
      width: 28px;
      height: 28px;
      border-radius: 4px;
      border: 2px solid #0a7c8c;
      background: #ffffff;
      overflow: hidden;
      vertical-align: middle;
      margin-left: 6px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.18s, opacity 0.18s;
    }
    .social-btn:hover { opacity: 0.8; }
    .social-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- orbit buttons — positioned by JS around center node -->
  <button class="orbit-btn" id="themeBtn" onclick="cycleTheme()"><span class="theme-swatch" id="themeSwatch"></span></button>
  <button class="orbit-btn" id="backArrow" onclick="goHome()">←</button>

  <!-- ══════════════════════════════════════════════
       MAIN VIEW
  ══════════════════════════════════════════════ -->
  <div id="viewMain" class="view">
    <svg viewBox="0 0 600 600" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="gl"><feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="glb"><feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <!-- MAKING/THINKING top-left → center right-angle -->
      <polyline id="tr-making-thinking" class="tr" points="200,120 200,266 254,266 254,300" fill="none" stroke="rgba(10,124,140,0.2)" stroke-width="2" stroke-linecap="square"/>
      <!-- GATHERING/SHARING right → center -->
      <polyline id="tr-gathering-sharing" class="tr" points="430,300 346,300" fill="none" stroke="rgba(10,124,140,0.2)" stroke-width="2" stroke-linecap="square"/>
      <!-- DISCUSSING bottom → center -->
      <polyline id="tr-discussing"        class="tr" points="300,354 300,432" fill="none" stroke="rgba(10,124,140,0.2)" stroke-width="2" stroke-linecap="square"/>
      <!-- junction dots -->
      <circle cx="254" cy="266" r="3" fill="rgba(10,124,140,0.25)"/>
      <!-- CENTER -->
      <g class="nd" onclick="activateCenter()">
        <circle cx="300" cy="300" r="54" fill="none" stroke="rgba(10,124,140,0.16)" stroke-width="1.2" stroke-dasharray="5 3"/>
        <circle cx="300" cy="300" r="46" fill="#071515" stroke="#0a7c8c" stroke-width="1.5" filter="url(#gl)"/>
        <circle class="nhalo" id="h-center" cx="300" cy="300" r="52" fill="none" stroke="#0a7c8c" stroke-width="2" filter="url(#glb)"/>
        <circle cx="300" cy="300" r="38" fill="#0a1e1e"/>
        <text x="300" y="293" text-anchor="middle" font-size="14" fill="#5ec8d4" letter-spacing="2" font-family="'Share Tech Mono',monospace">BEE NIX</text>
        <text x="300" y="311" text-anchor="middle" font-size="10" fill="rgba(94,200,212,0.5)" letter-spacing="1" font-family="'Share Tech Mono',monospace">SUTURE.BLUE</text>
      </g>
      <!-- MAKING/THINKING — IC chip, top-left -->
      <g class="nd" id="nd-making_thinking" onclick="activateNode('making_thinking')">
        <rect x="142" y="92" width="116" height="56" rx="3" fill="#071515" stroke="rgba(10,124,140,0.3)" stroke-width="1"/>
        <rect class="nhalo" id="h-making_thinking" x="137" y="87" width="126" height="66" rx="5" fill="none" stroke="#0a7c8c" stroke-width="1.5" filter="url(#glb)"/>
        <path d="M142,112 Q136,120 142,128" fill="none" stroke="rgba(10,124,140,0.4)" stroke-width="1"/>
        <line x1="142" y1="102" x2="128" y2="102" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="142" y1="112" x2="128" y2="112" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="142" y1="122" x2="128" y2="122" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="142" y1="132" x2="128" y2="132" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="258" y1="102" x2="272" y2="102" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="258" y1="112" x2="272" y2="112" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="258" y1="122" x2="272" y2="122" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="258" y1="132" x2="272" y2="132" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <text x="200" y="115" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#ffffff" font-weight="700" letter-spacing="1" font-family="'Share Tech Mono',monospace">MAKING /</text>
        <text x="200" y="131" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#ffffff" font-weight="700" letter-spacing="1" font-family="'Share Tech Mono',monospace">THINKING</text>
      </g>
      <!-- GATHERING/SHARING — Transistor, right, mirrored -->
      <g class="nd" id="nd-gathering_sharing" onclick="activateNode('gathering_sharing')">
        <circle cx="476" cy="300" r="30" fill="#071515" stroke="rgba(10,124,140,0.3)" stroke-width="1"/>
        <circle class="nhalo" id="h-gathering_sharing" cx="476" cy="300" r="36" fill="none" stroke="#0a7c8c" stroke-width="1.5" filter="url(#glb)"/>
        <line x1="506" y1="300" x2="492" y2="300" stroke="rgba(10,124,140,0.55)" stroke-width="1.5"/>
        <line x1="492" y1="286" x2="492" y2="314" stroke="rgba(10,124,140,0.55)" stroke-width="2"/>
        <line x1="492" y1="290" x2="472" y2="276" stroke="rgba(10,124,140,0.55)" stroke-width="1.5"/>
        <line x1="472" y1="276" x2="472" y2="266" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="492" y1="310" x2="472" y2="324" stroke="rgba(10,124,140,0.55)" stroke-width="1.5"/>
        <line x1="472" y1="324" x2="472" y2="334" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <polygon points="477,320 472,324 476,329" fill="rgba(10,124,140,0.65)"/>
        <line x1="446" y1="300" x2="430" y2="300" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <text x="476" y="293" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#ffffff" font-weight="700" letter-spacing="1" font-family="'Share Tech Mono',monospace">GATHERING /</text>
        <text x="476" y="307" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#ffffff" font-weight="700" letter-spacing="1" font-family="'Share Tech Mono',monospace">SHARING</text>
      </g>
      <!-- DISCUSSING — Crystal, bottom -->
      <g class="nd" id="nd-discussing" onclick="activateNode('discussing')">
        <rect x="256" y="432" width="88" height="32" rx="3" fill="#071515" stroke="rgba(10,124,140,0.4)" stroke-width="1.2"/>
        <rect class="nhalo" id="h-discussing" x="251" y="427" width="98" height="42" rx="5" fill="none" stroke="#0a7c8c" stroke-width="1.5" filter="url(#glb)"/>
        <line x1="274" y1="427" x2="274" y2="469" stroke="rgba(10,124,140,0.6)" stroke-width="2"/>
        <line x1="326" y1="427" x2="326" y2="469" stroke="rgba(10,124,140,0.6)" stroke-width="2"/>
        <line x1="256" y1="448" x2="242" y2="448" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="344" y1="448" x2="358" y2="448" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <line x1="300" y1="432" x2="300" y2="429" stroke="rgba(10,124,140,0.4)" stroke-width="1.5"/>
        <text x="300" y="448" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#ffffff" font-weight="700" letter-spacing="1" font-family="'Share Tech Mono',monospace">DISCUSSING</text>
      </g>
      <!-- Flavor -->
      <text x="56" y="48" font-family="'Share Tech Mono',monospace" font-size="9" fill="rgba(10,124,140,0.16)">VCC</text>
      <line x1="64" y1="51" x2="64" y2="62" stroke="rgba(10,124,140,0.13)" stroke-width="1"/>
      <line x1="56" y1="62" x2="72" y2="62" stroke="rgba(10,124,140,0.13)" stroke-width="1"/>
      <line x1="58" y1="66" x2="70" y2="66" stroke="rgba(10,124,140,0.13)" stroke-width="1"/>
      <line x1="60" y1="70" x2="68" y2="70" stroke="rgba(10,124,140,0.13)" stroke-width="1"/>
      <text x="506" y="548" font-family="'Share Tech Mono',monospace" font-size="9" fill="rgba(10,124,140,0.16)">GND</text>

const VB_CX = 300, VB_CY = 300, VB_R = 46;   // center node, viewBox coords

// Label typography is FIXED. Node text never shrinks — it matches the
// main board's 11px so sub-nodes stay as readable as the top-level ones.
const NODE_FONT   = 11;
const CHAR_W      = NODE_FONT * 0.62;   // Share Tech Mono advance width
const PAD_X       = 14;                 // horizontal padding inside a node box
const LINE_H      = 15;                 // line height for wrapped labels
const NODE_H_1    = 36;                 // box height, single line
const NODE_H_2    = LINE_H * 2 + 12;    // box height, two lines
const NODE_W_MIN  = 72;
const WRAP_CHARS  = 18;                 // labels longer than this wrap to 2 lines

// Space constraints, in SCREEN PIXELS.
// EDGE_MARGIN_MAX is the ideal breathing room from the viewport edge; on a
// narrow screen it relaxes toward EDGE_MARGIN_MIN so that the FONT never has
// to shrink. Margin gives, text doesn't.
const EDGE_MARGIN_MAX = 100;
const EDGE_MARGIN_MIN = 24;
const EDGE_STEP       = 2;
const MIN_RADIUS_PX   = 100;   // nodes may come this close to the center node
const MAX_RADIUS_VB   = 340;   // don't fling nodes absurdly far on huge screens

// ── geometry helpers ────────────────────────────────
/* Uniform scale between viewBox units and screen px. The SVG is a fixed
   600x600 viewBox with xMidYMid meet, so one unit == vbScale() px on both axes. */
function vbScale() {
  const wrap = document.getElementById('wrap');
  return Math.min(wrap.offsetWidth / 600, wrap.offsetHeight / 600);
}
function pxToVb(px) { return px / vbScale(); }

/* The viewport inset by `edgePx`, expressed in viewBox coords. Because 'meet'
   letterboxes the SVG, this rect can extend past 0..600 on the long axis —
   that space is real and usable, so nodes are allowed to spread into it. */
function safeRectVb(edgePx) {
  const wrap = document.getElementById('wrap');
  const ww = wrap.offsetWidth, wh = wrap.offsetHeight;
  const s = vbScale();
  const offX = (ww - 600 * s) / 2;
  const offY = (wh - 600 * s) / 2;
  return {
    x0: (edgePx - offX) / s,
    y0: (edgePx - offY) / s,
    x1: (ww - edgePx - offX) / s,
    y1: (wh - edgePx - offY) / s
  };
}

/* Split a label into at most two lines, breaking at the space nearest the
   middle so both lines come out roughly even. Labels with no space stay
   whole — we'd rather have one wide box than a mid-word break. */
function wrapLabel(label) {
  if (label.length <= WRAP_CHARS) return [label];
  const spaces = [];
  for (let i = 0; i < label.length; i++) if (label[i] === ' ') spaces.push(i);
  if (!spaces.length) return [label];
  const mid = label.length / 2;
  let best = spaces[0];
  for (const s of spaces) if (Math.abs(s - mid) < Math.abs(best - mid)) best = s;
  return [label.slice(0, best), label.slice(best + 1)];
}

/* Box dimensions for a label, in viewBox units. */
function nodeBox(label) {
  const lines = wrapLabel(label);
  const longest = lines.reduce((m, l) => Math.max(m, l.length), 0);
  return {
    lines,
    w: Math.max(NODE_W_MIN, longest * CHAR_W + PAD_X * 2),
    h: lines.length === 2 ? NODE_H_2 : NODE_H_1
  };
}

/* Distribute n nodes evenly around the circle. Odd counts start dead-top;
   even counts get a half-step offset so nothing lands on a pure diagonal. */
function subAngles(n) {
  const step = 360 / n;
  const start = -90 + (n % 2 === 0 ? step / 2 : 0);
  const out = [];
  for (let i = 0; i < n; i++) out.push((start + i * step) * Math.PI / 180);
  return out;
}

/* How far along `angle` a box of half-size (hw,hh) can travel from center
   before any of its edges crosses the safe rect. */
function maxRadiusOnRay(angle, hw, hh, safe) {
  const dx = Math.cos(angle), dy = Math.sin(angle);
  let r = Infinity;
  if (dx >  0.0001) r = Math.min(r, (safe.x1 - hw - VB_CX) / dx);
  if (dx < -0.0001) r = Math.min(r, (safe.x0 + hw - VB_CX) / dx);
  if (dy >  0.0001) r = Math.min(r, (safe.y1 - hh - VB_CY) / dy);
  if (dy < -0.0001) r = Math.min(r, (safe.y0 + hh - VB_CY) / dy);
  return r;
}

function rectsOverlap(a, b) {
  return a.x0 < b.x1 && a.x1 > b.x0 && a.y0 < b.y1 && a.y1 > b.y0;
}

// ── live theme accent, for anything painted OUTSIDE applyTheme ───────
/* Sub-node hover strokes are written at event time, long after applyTheme
   has run, so they can't use a captured color — they'd freeze whatever the
   theme was when the board was built. These read the CURRENT theme instead.
   Rainbow is a moving target, so we defer to its animated hue. */
const HOVER_ALPHA = 0.8;
const IDLE_ALPHA  = 0.35;

function subNodeStroke(hovered) {
  const t = THEMES[themeIndex];
  const a = hovered ? HOVER_ALPHA : IDLE_ALPHA;
  if (t && t.rainbow) return `hsla(${rainbowHue}, 65%, 45%, ${a})`;
  // derive from the theme's solid accent hex
  const hex = (t && t.acc) || '#0a7c8c';
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

// ══════════════════════════════════════════════════════
//  MAIN BOARD — reposition outer nodes on resize
// ══════════════════════════════════════════════════════
function repositionOuterNodes() {
  const ww = window.innerWidth;
  const wh = window.innerHeight;
  const aspect = wh / ww;

  const VX = VB_CX, VY = VB_CY;
  const BASE_H = 190, BASE_V = 190;
  const vOff = Math.min(Math.round(BASE_V * Math.max(1, aspect * 1.2)), 270);
  const hOff = Math.min(Math.round(BASE_H * Math.max(1, (1 / aspect) * 1.2)), 250);

  const topY = VY - vOff;

  // MAKING/THINKING — IC chip, top-left
  const mtY = topY, mtX = 200;
  moveRect('nd-making_thinking', mtX - 58, mtY - 28, 116, 56);
  moveChipPins('nd-making_thinking', mtX, mtY);
  moveTexts('nd-making_thinking', mtX, mtY - 8, mtX, mtY + 8);

    mtX + ',' + (mtY + 28) + ' ' + mtX + ',' + (VY - 46) + ' ' +
    (VX - 46) + ',' + (VY - 46) + ' ' + (VX - 46) + ',' + VY);

  // GATHERING/SHARING — transistor, right
  const gsX = VX + hOff, gsY = VY;
  moveCircle('nd-gathering_sharing', gsX, gsY, 30);
  moveCircle('h-gathering_sharing', gsX, gsY, 36);
  moveTransistorLines('nd-gathering_sharing', gsX, gsY);
  moveTexts('nd-gathering_sharing', gsX, gsY - 7, gsX, gsY + 7);
  const trGs = document.getElementById('tr-gathering-sharing');
  if (trGs) trGs.setAttribute('points', (VX + 46) + ',' + VY + ' ' + (gsX - 30) + ',' + VY);

  // DISCUSSING — crystal, bottom
  const dX = VX, dY = VY + vOff;
  moveRect('nd-discussing', dX - 44, dY - 16, 88, 32);
  moveCrystalLines('nd-discussing', dX, dY);
  moveTexts('nd-discussing', dX, dY, null, null);
  const trDisc = document.getElementById('tr-discussing');
  if (trDisc) trDisc.setAttribute('points', VX + ',' + (VY + 46) + ' ' + VX + ',' + (dY - 16));

  const junc = document.querySelector('#viewMain svg circle[r="3"]');
  if (junc) { junc.setAttribute('cx', VX - 46); junc.setAttribute('cy', VY - 46); }

  positionAllOrbitBtns();
}

function moveRect(groupId, x, y, w, h) {
  const id = groupId.startsWith('nd-') ? groupId : 'nd-' + groupId;
  const g = document.getElementById(id);
  if (!g) return;
  const r = g.querySelector('rect:not(.nhalo)');
  if (r) { r.setAttribute('x', x); r.setAttribute('y', y); r.setAttribute('width', w); r.setAttribute('height', h); }
  const nh = g.querySelector('.nhalo');
  if (nh && nh.tagName === 'rect') {
    nh.setAttribute('x', x - 5); nh.setAttribute('y', y - 5);
    nh.setAttribute('width', w + 10); nh.setAttribute('height', h + 10);
  }
}
function moveCircle(id, cx, cy, r) {
  const el = document.getElementById(id) ||
             document.querySelector('#nd-' + id.replace('h-', '') + ' circle[r="' + r + '"]');
  if (el) { el.setAttribute('cx', cx); el.setAttribute('cy', cy); }
}
function moveTexts(groupId, x1, y1, x2, y2) {
  const g = document.getElementById(groupId);
  if (!g) return;
  const texts = g.querySelectorAll('text');
  if (texts[0]) { texts[0].setAttribute('x', x1); texts[0].setAttribute('y', y1); }
  if (texts[1] && x2 !== null) { texts[1].setAttribute('x', x2); texts[1].setAttribute('y', y2); }
}
function moveChipPins(groupId, cx, cy) {
  const g = document.getElementById(groupId);
  if (!g) return;
  const lx = cx - 58, rx = cx + 58;
  const lines = g.querySelectorAll('line');
  const offsets = [-18, -6, 6, 18];
  lines.forEach((l, i) => {
    if (i < 4) {
      l.setAttribute('x1', lx); l.setAttribute('y1', cy + offsets[i]);
      l.setAttribute('x2', lx - 14); l.setAttribute('y2', cy + offsets[i]);
    } else {
      l.setAttribute('x1', rx); l.setAttribute('y1', cy + offsets[i - 4]);
      l.setAttribute('x2', rx + 14); l.setAttribute('y2', cy + offsets[i - 4]);
    }
  });
  const notch = g.querySelector('path');
  if (notch) notch.setAttribute('d', 'M' + lx + ',' + (cy - 12) + ' Q' + (lx - 6) + ',' + cy + ' ' + lx + ',' + (cy + 12));
}
function moveTransistorLines(groupId, cx, cy) {
  const g = document.getElementById(groupId);
  if (!g) return;
  const lines = g.querySelectorAll('line');
  const bar = cx + 16;
  const arm = cx - 4;
  const attrs = [
    [cx + 46, cy,      cx + 30, cy     ],
    [bar,     cy - 14, bar,     cy + 14],
    [bar,     cy - 10, arm,     cy - 24],
    [arm,     cy - 24, arm,     cy - 34],
    [bar,     cy + 10, arm,     cy + 24],
    [arm,     cy + 24, arm,     cy + 34],
    [cx - 30, cy,      cx - 46, cy     ]
  ];
  attrs.forEach(([x1, y1, x2, y2], i) => {
    if (lines[i]) {
      lines[i].setAttribute('x1', x1); lines[i].setAttribute('y1', y1);
      lines[i].setAttribute('x2', x2); lines[i].setAttribute('y2', y2);
    }
  });
  const poly = g.querySelector('polygon');
  if (poly) poly.setAttribute('points',
    (arm + 5) + ',' + (cy + 20) + ' ' + arm + ',' + (cy + 24) + ' ' + (arm + 4) + ',' + (cy + 29));
  g.querySelectorAll('circle').forEach(c => { c.setAttribute('cx', cx); c.setAttribute('cy', cy); });
}
function moveCrystalLines(groupId, cx, cy) {
  const g = document.getElementById(groupId);
  if (!g) return;
  const lines = g.querySelectorAll('line');
  const x1 = cx - 26, x2 = cx + 26;
  if (lines[0]) { lines[0].setAttribute('x1', x1); lines[0].setAttribute('y1', cy - 16); lines[0].setAttribute('x2', x1); lines[0].setAttribute('y2', cy + 16); }
  if (lines[1]) { lines[1].setAttribute('x1', x2); lines[1].setAttribute('y1', cy - 16); lines[1].setAttribute('x2', x2); lines[1].setAttribute('y2', cy + 16); }
  if (lines[2]) { lines[2].setAttribute('x1', cx - 44); lines[2].setAttribute('y1', cy); lines[2].setAttribute('x2', cx - 28); lines[2].setAttribute('y2', cy); }
  if (lines[3]) { lines[3].setAttribute('x1', cx + 28); lines[3].setAttribute('y1', cy); lines[3].setAttribute('x2', cx + 44); lines[3].setAttribute('y2', cy); }
  if (lines[4]) { lines[4].setAttribute('x1', cx); lines[4].setAttribute('y1', cy - 16); lines[4].setAttribute('x2', cx); lines[4].setAttribute('y2', cy - 19); }
  const nh = g.querySelector('.nhalo');
  if (nh) { nh.setAttribute('x', cx - 49); nh.setAttribute('y', cy - 21); }
}

// ══════════════════════════════════════════════════════
//  SUB BOARD — dynamic angle + radius reflow
// ══════════════════════════════════════════════════════
function buildSubBoard(s) {
  const svg = document.getElementById('svgSub');
  if (!svg) return;

  // wipe everything except <defs>
  [...svg.children].forEach(c => { if (c.tagName !== 'defs') svg.removeChild(c); });

  const items  = s.items;
  const angles = subAngles(items.length);
  const minR   = pxToVb(MIN_RADIUS_PX);

  // Boxes are computed once — text size and wrapping never depend on the
  // viewport, so a label doesn't reflow while you resize the window.
  const boxes = items.map(it => nodeBox(it.l));

  // Find the most generous edge margin that still fits every node.
  // Walking DOWN from the ideal means desktop keeps its full 100px, and only
  // cramped screens pay — by giving up margin, never by shrinking type.
  let placed = null;
  for (let edge = EDGE_MARGIN_MAX; edge >= EDGE_MARGIN_MIN; edge -= EDGE_STEP) {
    const safe = safeRectVb(edge);
    const trial = angles.map((a, i) => {
      const b = boxes[i];
      const rMax = maxRadiusOnRay(a, b.w / 2, b.h / 2, safe);
      return {
        a, w: b.w, h: b.h, lines: b.lines, item: items[i],
        r: Math.max(minR, Math.min(rMax, MAX_RADIUS_VB)),
        fits: rMax >= minR
      };
    });
    if (trial.every(t => t.fits)) { placed = trial; break; }
  }

  // Even the tightest margin couldn't fit everything (very small viewport).
  // Hold the radius floor and let boxes overhang rather than shrink the text.
  if (!placed) {
    placed = angles.map((a, i) => ({
      a, w: boxes[i].w, h: boxes[i].h, lines: boxes[i].lines,
      item: items[i], r: minR, fits: false
    }));
  }

  // The WRITING links are a fixed HTML overlay in the top-left corner.
  // Treat that corner as occupied and pull any colliding node inward along
  // its own ray until it clears — floored at minR so it can't invade center.
  const nodeDef = activeSubId ? nodes[activeSubId] : null;
  if (nodeDef && nodeDef.writingLinks && nodeDef.writingLinks.length) {
    const wrap = document.getElementById('wrap');
    const sc = vbScale();
    const offX = (wrap.offsetWidth  - 600 * sc) / 2;
    const offY = (wrap.offsetHeight - 600 * sc) / 2;
    const PAD = 14;
    const linkZone = {
      x0: (0 - offX) / sc,
      y0: (0 - offY) / sc,
      x1: (215 + PAD - offX) / sc,
      y1: (95  + PAD - offY) / sc
    };
    const stepVb = pxToVb(6);
    placed.forEach(p => {
      for (let guard = 0; guard < 60; guard++) {
        const x = VB_CX + p.r * Math.cos(p.a);
        const y = VB_CY + p.r * Math.sin(p.a);
        const box = { x0: x - p.w / 2, y0: y - p.h / 2, x1: x + p.w / 2, y1: y + p.h / 2 };
        if (!rectsOverlap(box, linkZone)) break;
        if (p.r - stepVb < minR) { p.r = minR; break; }
        p.r -= stepVb;
      }
    });
  }

  // ── draw ──
  const acc = '#0a7c8c';   // seed color; applyTheme() re-skins after snapshot
  const svgEl = (tag, attrs) => {
    const el = document.createElementNS(NS, tag);
    Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
    return el;
  };

  svg.appendChild(svgEl('circle', { cx: VB_CX, cy: VB_CY, r: 46, fill: '#071515', stroke: acc, 'stroke-width': 1.5, filter: 'url(#gl2)' }));
  svg.appendChild(svgEl('circle', { cx: VB_CX, cy: VB_CY, r: 38, fill: '#0a1e1e' }));
  const cLabel = svgEl('text', {
    x: VB_CX, y: VB_CY, 'text-anchor': 'middle', 'dominant-baseline': 'central',
    'font-size': 14, fill: '#5ec8d4', 'letter-spacing': 1,
    'font-family': "'Share Tech Mono',monospace"
  });
  cLabel.id = 'subCenterLabel';
  cLabel.textContent = s.center;
  svg.appendChild(cLabel);

  placed.forEach((p, i) => {
    const x  = Math.round(VB_CX + p.r * Math.cos(p.a));
    const y  = Math.round(VB_CY + p.r * Math.sin(p.a));
    const ex = Math.round(VB_CX + VB_R * Math.cos(p.a));
    const ey = Math.round(VB_CY + VB_R * Math.sin(p.a));

    // trace: center edge → node, along the node's own ray
    svg.appendChild(svgEl('polyline', {
      class: 'tr',
      points: ex + ',' + ey + ' ' + x + ',' + y,
      fill: 'none',
      stroke: 'rgba(10,124,140,0.18)',
      'stroke-width': 2,
      'stroke-linecap': 'square'
    }));

    const g = svgEl('g', { id: 'sub-n' + (i + 1), cursor: 'pointer' });
    g.classList.add('sub-nd');

    const rect = svgEl('rect', {
      x: Math.round(x - p.w / 2), y: Math.round(y - p.h / 2),
      width: Math.round(p.w), height: Math.round(p.h), rx: 3,
      fill: '#071515', stroke: subNodeStroke(false), 'stroke-width': 1,
      filter: 'url(#glb2)'
    });
    g.appendChild(rect);

    // One <text> per line, vertically centered as a block.
    const n = p.lines.length;
    p.lines.forEach((line, li) => {
      const ly = n === 1 ? y : y - LINE_H / 2 + li * LINE_H;
      const t = svgEl('text', {
        x, y: ly,
        'text-anchor': 'middle', 'dominant-baseline': 'central',
        'font-size': NODE_FONT, fill: '#ffffff', 'font-weight': 700,
        'font-family': "'Share Tech Mono',monospace"
      });
      t.textContent = line;
      g.appendChild(t);
    });

    g.addEventListener('click', () => openSubPanel(p.item));
    // Mark the hovered rect with a class so the rainbow tick can keep
    // repainting it at hover opacity while the hue drifts.
    g.addEventListener('mouseenter', () => {
      rect.classList.add('sub-hot');
      rect.setAttribute('stroke', subNodeStroke(true));
    });
    g.addEventListener('mouseleave', () => {
      rect.classList.remove('sub-hot');
      rect.setAttribute('stroke', subNodeStroke(false));
    });
    svg.appendChild(g);
  });

  // register the new elements, then re-skin them to the active theme
  addNewElementsToSnapshot();
  const t = THEMES[themeIndex];
  if (t && !t.rainbow) applyTheme(t);
}

// ══════════════════════════════════════════════════════
//  ORBIT BUTTONS — fixed angle, size scales with frame
// ══════════════════════════════════════════════════════
const SIDE_ANGLES = {
  'right':        90,
  'bottom-right': 135,
  'bottom':       180,
  'bottom-left':  225,
  'left':         270,
  'top-left':     315,
  'top':          0,
  'top-right':    45
};

const THEME_ANGLE = 45;
const INNER_SCALE = 1.44;
const OUTER_SCALE = 2.5;

const BACK_BASE   = 44;   // px at scale 1
const BACK_FONT   = 22;
const SWATCH_BASE = 18;
const THEMEBTN_BASE = 22;

/* Button size multiplier, driven by the smaller viewport dimension.
   Clamped so buttons never vanish on a phone or balloon on a 4K display. */
function orbitBtnScale() {
  const d = Math.min(window.innerWidth, window.innerHeight);
  return Math.max(0.72, Math.min(1.3, d / 800));
}

function vbToScreen(vbX, vbY) {
  const wrap = document.getElementById('wrap');
  const ww = wrap.offsetWidth, wh = wrap.offsetHeight;
  const s = Math.min(ww / 600, wh / 600);
  const offX = (ww - 600 * s) / 2;
  const offY = (wh - 600 * s) / 2;
  return { x: offX + vbX * s, y: offY + vbY * s };
}

function orbitPoint(angleDeg, scale) {
  const rad = (angleDeg - 90) * Math.PI / 180;
  const r = VB_R * scale;
  return vbToScreen(VB_CX + r * Math.cos(rad), VB_CY + r * Math.sin(rad));
}

function placeBtn(btn, angleDeg, scale) {
  if (!btn) return;
  const pos = orbitPoint(angleDeg, scale);
  btn.style.left = pos.x + 'px';
  btn.style.top  = pos.y + 'px';
}

function positionAllOrbitBtns() {
  const k = orbitBtnScale();

  const back = document.getElementById('backArrow');
  if (back) {
    const bs = Math.round(BACK_BASE * k);
    back.style.width    = bs + 'px';
    back.style.height   = bs + 'px';
    back.style.fontSize = Math.round(BACK_FONT * k) + 'px';
  }

  const sw = document.getElementById('themeSwatch');
  if (sw) {
    const ss = Math.round(SWATCH_BASE * k);
    sw.style.width  = ss + 'px';
    sw.style.height = ss + 'px';
  }
  const tb = document.getElementById('themeBtn');
  if (tb) {
    const ts = Math.round(THEMEBTN_BASE * k);
    tb.style.width  = ts + 'px';
    tb.style.height = ts + 'px';
  }

  // Both buttons use translate(-50%,-50%), so the orbit point is the box
  // center — resizing grows the box around the anchor with no drift.
  placeBtn(tb, THEME_ANGLE, INNER_SCALE);
  if (currentSide !== null && back) {
    const angle = SIDE_ANGLES[currentSide] !== undefined ? SIDE_ANGLES[currentSide] : 270;
    placeBtn(back, angle, OUTER_SCALE);
  }
}

function positionBackArrow(side) {
  currentSide = side;
  positionAllOrbitBtns();
}

// ══════════════════════════════════════════════════════
//  RESIZE / ORIENTATION
// ══════════════════════════════════════════════════════
let resizeTimer = null;

function handleResize() {
  repositionOuterNodes();
  if (inSub && activeSubId && nodes[activeSubId]) {
    buildSubBoard(nodes[activeSubId].sub);
  }
  if (inSub && currentSide) positionBackArrow(currentSide);
  positionAllOrbitBtns();
}

window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(handleResize, 60);
});
window.addEventListener('orientationchange', () => {
  setTimeout(handleResize, 200);
  setTimeout(handleResize, 500);
});
document.getElementById('viewMain').addEventListener('transitionend', positionAllOrbitBtns);
document.getElementById('viewSub').addEventListener('transitionend', positionAllOrbitBtns);

let themeIndex = 0;

// Snapshot original SVG attribute values so applyTheme always remaps from
// originals rather than from whatever the previous theme happened to write.
let svgSnapshot = null;

function snapshotSVG() {
  svgSnapshot = [];
  let maxIdx = 0;
  document.querySelectorAll('svg *').forEach((el, i) => {
    el.dataset.snapIdx = i;
    const snap = { idx: i, tag: el.tagName };
    ['fill', 'stroke', 'r'].forEach(a => {
      const v = el.getAttribute(a);
      if (v !== null) snap[a] = v;
    });
    snap.classList = [...el.classList];
    svgSnapshot.push(snap);
    maxIdx = i;
  });
  svgSnapshot._maxIdx = maxIdx;
}

// Register only newly-injected sub-board elements, without re-snapshotting.
function addNewElementsToSnapshot() {
  if (!svgSnapshot) { snapshotSVG(); return; }
  let i = (svgSnapshot._maxIdx || svgSnapshot.length) + 1;
  document.querySelectorAll('svg *').forEach(el => {
    if (el.dataset.snapIdx === undefined || el.dataset.snapIdx === '') {
      el.dataset.snapIdx = i;
      const snap = { idx: i, tag: el.tagName };
      ['fill', 'stroke', 'r'].forEach(a => {
        const v = el.getAttribute(a);
        if (v !== null) snap[a] = v;
      });
      snap.classList = [...el.classList];
      svgSnapshot.push(snap);
      i++;
    }
  });
  svgSnapshot._maxIdx = i - 1;
}

// Drop snapshot entries whose elements are gone (sub-board rebuilds).
function pruneSnapshot() {
  if (!svgSnapshot) return;
  const max = svgSnapshot._maxIdx;
  svgSnapshot = svgSnapshot.filter(s =>
    document.querySelector('[data-snap-idx="' + s.idx + '"]') !== null);
  svgSnapshot._maxIdx = max;
}

function applyTheme(t) {
  if (!svgSnapshot) snapshotSVG();
  pruneSnapshot();

  document.body.style.background = t.bg;
  document.querySelector('.wrap').style.background = t.bg;

  let gs = document.getElementById('dyn-grid');
  if (!gs) { gs = document.createElement('style'); gs.id = 'dyn-grid'; document.head.appendChild(gs); }
  gs.textContent = `.wrap::before{background-image:linear-gradient(${t.grid} 1px,transparent 1px),linear-gradient(90deg,${t.grid} 1px,transparent 1px)!important}`;

  document.querySelectorAll('.corner').forEach(c => c.style.borderColor = t.brd);

  svgSnapshot.forEach(snap => {
    const el = document.querySelector(`[data-snap-idx="${snap.idx}"]`);
    if (!el) return;
    const cls = snap.classList || [];
    const origFill   = snap.fill   || '';
    const origStroke = snap.stroke || '';
    const r = parseFloat(snap.r || '0');

    if (cls.includes('nhalo')) { el.setAttribute('stroke', t.acc); return; }

    if (snap.tag === 'polyline') {
      if (!el.classList.contains('lit')) el.setAttribute('stroke', t.tr_c);
      return;
    }
    if (snap.tag === 'circle' && r <= 4 && origFill.startsWith('rgba')) {
      el.setAttribute('fill', t.jc); return;
    }
    if (snap.tag === 'circle' && r >= 50 && origFill === 'none') {
      el.setAttribute('stroke', t.brd); return;
    }
    if (snap.tag === 'circle' && r >= 28 && origFill.match(/^#0[0-9a-f]/i)) {
      if (r >= 44)      { el.setAttribute('stroke', t.acc); el.setAttribute('fill', t.bg2); }
      else if (r >= 36) { el.setAttribute('stroke', t.acc); el.setAttribute('fill', t.bg3); }
      else              { el.setAttribute('fill', t.bg2); if (origStroke && origStroke.startsWith('rgba')) el.setAttribute('stroke', t.ns); }
      return;
    }
    if (snap.tag === 'rect') {
      if (origFill.match(/^#0[0-9a-f]/i)) el.setAttribute('fill', t.bg2);
      if (origStroke.startsWith('rgba')) {
        // a sub-node currently under the cursor keeps its hover brightness
        el.setAttribute('stroke',
          el.classList.contains('sub-hot') ? subNodeStroke(true) : t.ns);
      }
      return;
    }
    if (snap.tag === 'line')    { if (origStroke.startsWith('rgba')) el.setAttribute('stroke', t.ns); return; }
    if (snap.tag === 'path')    { if (origStroke.startsWith('rgba')) el.setAttribute('stroke', t.ns); return; }
    if (snap.tag === 'polygon') { el.setAttribute('fill', t.ns); return; }
    if (snap.tag === 'text') {
      if (origFill === '#ffffff') return;   // white node labels stay white
      if (origFill === 'none')    return;
      if (origFill === '#5ec8d4' || origFill.startsWith('rgba(94,200')) {
        el.setAttribute('fill', t.tx); return;
      }
      if (origFill.startsWith('rgba')) { el.setAttribute('fill', t.txs); return; }
      return;
    }
  });

  const r = document.documentElement;
  r.style.setProperty('--sp-bg',   t.pBg);
  r.style.setProperty('--sp-bd',   t.pBd);
  r.style.setProperty('--sp-hbg',  t.hBg);
  r.style.setProperty('--sp-hbd',  t.hBd);
  r.style.setProperty('--sp-tx',   t.tx);
  r.style.setProperty('--sp-acc',  t.ns);
  r.style.setProperty('--sp-desc', t.desc);
  r.style.setProperty('--sp-link', t.acc);
  r.style.setProperty('--sp-ibg',  t.iBg);
  r.style.setProperty('--sp-ph',   t.ph);

  let ts = document.getElementById('dyn-tr');
  if (!ts) { ts = document.createElement('style'); ts.id = 'dyn-tr'; document.head.appendChild(ts); }
  ts.textContent = `
    .tr.lit{stroke:${t.acc}!important;filter:drop-shadow(0 0 4px ${t.glow})!important}
    #backArrow{border-color:${t.acc}!important;color:${t.acc}!important}
    #backArrow:hover{background:${t.acc}!important;color:#fff!important}
    .p-close:hover,.p-more:hover{background:${t.acc}!important;color:#fff!important}
  `;

  const sw = document.getElementById('themeSwatch');
  if (t.rainbow) { sw.classList.add('rainbow'); sw.style.background = ''; }
  else           { sw.classList.remove('rainbow'); sw.style.background = t.swatch; }

  requestAnimationFrame(positionAllOrbitBtns);
}

// ── RAINBOW ANIMATION ────────────────────────────────
let rainbowFrame = null;
let rainbowHue = 0;

function rainbowTick() {
  rainbowHue = (rainbowHue + 0.08) % 360;
  const h = rainbowHue;

  const acc  = `hsl(${h}, 70%, 45%)`;
  const tx   = `hsl(${h}, 60%, 72%)`;
  const txs  = `hsla(${h}, 60%, 72%, 0.5)`;
  const tr_c = `hsla(${h}, 65%, 40%, 0.22)`;
  const ns   = `hsla(${h}, 65%, 40%, 0.45)`;
  const jc   = `hsla(${h}, 65%, 40%, 0.35)`;
  const brd  = `hsla(${h}, 50%, 35%, 0.35)`;
  const glow = `hsla(${h}, 70%, 45%, 0.7)`;
  const grid = `hsla(${h}, 50%, 30%, 0.07)`;
  const pBd  = `hsla(${h}, 60%, 40%, 0.5)`;
  const hBg  = `hsla(${h}, 60%, 35%, 0.15)`;
  const hBd  = `hsla(${h}, 60%, 40%, 0.4)`;
  const ph   = `hsla(${h}, 60%, 40%, 0.5)`;
  const bgH  = (h + 180) % 360;

  document.body.style.background = `hsl(${bgH}, 25%, 4%)`;
  document.querySelector('.wrap').style.background = `hsl(${bgH}, 25%, 4%)`;

  const gs = document.getElementById('dyn-grid');
  if (gs) gs.textContent = `.wrap::before{background-image:linear-gradient(${grid} 1px,transparent 1px),linear-gradient(90deg,${grid} 1px,transparent 1px)!important}`;

  document.querySelectorAll('.corner').forEach(c => c.style.borderColor = brd);

  if (svgSnapshot) {
    svgSnapshot.forEach(snap => {
      const el = document.querySelector(`[data-snap-idx="${snap.idx}"]`);
      if (!el) return;
      const cls = snap.classList || [];
      const origFill   = snap.fill   || '';
      const origStroke = snap.stroke || '';
      const r = parseFloat(snap.r || '0');

      if (cls.includes('nhalo')) { el.setAttribute('stroke', acc); return; }
      if (snap.tag === 'polyline' && !el.classList.contains('lit')) { el.setAttribute('stroke', tr_c); return; }
      if (snap.tag === 'circle' && r <= 4  && origFill.startsWith('rgba')) { el.setAttribute('fill', jc); return; }
      if (snap.tag === 'circle' && r >= 50 && origFill === 'none') { el.setAttribute('stroke', brd); return; }
      if (snap.tag === 'circle' && r >= 28 && origFill.match(/^#0[0-9a-f]/i)) {
        if (r >= 44)      { el.setAttribute('stroke', acc); el.setAttribute('fill', `hsl(${bgH},25%,5%)`); }
        else if (r >= 36) { el.setAttribute('stroke', acc); el.setAttribute('fill', `hsl(${bgH},25%,8%)`); }
        else              { el.setAttribute('fill', `hsl(${bgH},25%,5%)`); if (origStroke && origStroke.startsWith('rgba')) el.setAttribute('stroke', ns); }
        return;
      }
      if (snap.tag === 'rect') {
        if (origFill.match(/^#0[0-9a-f]/i)) el.setAttribute('fill', `hsl(${bgH},25%,5%)`);
        if (origStroke.startsWith('rgba')) {
          // hovered sub-node tracks the drifting hue at hover opacity,
          // instead of being stomped back to idle every frame
          el.setAttribute('stroke', el.classList.contains('sub-hot')
            ? `hsla(${h}, 65%, 45%, ${HOVER_ALPHA})`
            : ns);
        }
        return;
      }
      if (snap.tag === 'line')    { if (origStroke.startsWith('rgba')) el.setAttribute('stroke', ns); return; }
      if (snap.tag === 'path')    { if (origStroke.startsWith('rgba')) el.setAttribute('stroke', ns); return; }
      if (snap.tag === 'polygon') { el.setAttribute('fill', ns); return; }
      if (snap.tag === 'text') {
        if (origFill === '#ffffff') return;
        if (origFill === 'none')    return;
        if (origFill === '#5ec8d4' || origFill.startsWith('rgba(94,200')) { el.setAttribute('fill', tx); return; }
        if (origFill.startsWith('rgba')) { el.setAttribute('fill', txs); return; }
      }
    });
  }

  const ts = document.getElementById('dyn-tr');
  if (ts) ts.textContent = `
    .tr.lit{stroke:${acc}!important;filter:drop-shadow(0 0 4px ${glow})!important}
    #backArrow{border-color:${acc}!important;color:${acc}!important}
    #backArrow:hover{background:${acc}!important;color:#fff!important}
    .p-close:hover,.p-more:hover{background:${acc}!important;color:#fff!important}
  `;

  const rr = document.documentElement;
  rr.style.setProperty('--sp-bg',   `hsl(${bgH},25%,4%)`);
  rr.style.setProperty('--sp-bd',   pBd);
  rr.style.setProperty('--sp-hbg',  hBg);
  rr.style.setProperty('--sp-hbd',  hBd);
  rr.style.setProperty('--sp-tx',   tx);
  rr.style.setProperty('--sp-acc',  ns);
  rr.style.setProperty('--sp-desc', `hsla(${h},40%,85%,0.9)`);
  rr.style.setProperty('--sp-link', acc);
  rr.style.setProperty('--sp-ibg',  `hsl(${bgH},25%,5%)`);
  rr.style.setProperty('--sp-ph',   ph);

  const sw = document.getElementById('themeSwatch');
  if (sw) { sw.style.background = `hsl(${h}, 70%, 55%)`; sw.style.animation = 'none'; }

  rainbowFrame = requestAnimationFrame(rainbowTick);
}

function startRainbow() { if (!rainbowFrame) rainbowTick(); }
function stopRainbow()  { if (rainbowFrame) { cancelAnimationFrame(rainbowFrame); rainbowFrame = null; } }

function cycleTheme() {
  themeIndex = (themeIndex + 1) % THEMES.length;
  const t = THEMES[themeIndex];
  stopRainbow();
  if (t.rainbow) startRainbow();
  else           applyTheme(t);
}

// ══════════════════════════════════════════════════════
//  PANELS / INTERACTION
// ══════════════════════════════════════════════════════
function clearTraces() {
  document.querySelectorAll('.tr').forEach(t => t.classList.remove('lit'));
  document.querySelectorAll('.nhalo').forEach(h => h.classList.remove('on'));
}

function closePanel() {
  document.getElementById('panel').classList.remove('vis');
  clearTraces();
  activeId = null;
}

function setImage(src) {
  const img  = document.getElementById('pImg');
  const ph   = document.getElementById('pImgPh');
  const wrap = document.getElementById('pImgWrap');
  if (src) {
    img.style.display = 'none';
    ph.style.display  = 'none';
    img.onload  = () => { img.style.display = 'block'; wrap.style.display = 'flex'; };
    img.onerror = () => { wrap.style.display = 'none'; };
    img.src = src;
  } else {
    img.style.display  = 'none';
    ph.style.display   = 'none';
    wrap.style.display = 'none';
  }
}

function activateCenter() {
  if (inSub) return;
  if (activeId === '__center') { closePanel(); return; }
  activeId = '__center';
  clearTraces();
  document.getElementById('h-center').classList.add('on');
  document.getElementById('pHeaderTitle').textContent = about.title;
  document.getElementById('pMore').style.display = 'none';
  const descEl = document.getElementById('pDesc');
  descEl.innerHTML = about.desc.replace(/\n/g, '<br>') +
    `<br><br>` +
    (about.cv ? `<a href="${about.cv}" target="_blank" class="cv-link">VIEW CV →</a>` : '') +
    (about.linkedin ? `<a href="${about.linkedin}" target="_blank" class="social-btn" title="LinkedIn"><img src="assets/linkedin.png" alt="LinkedIn"></a>` : '') +
    (about.instagram ? `<a href="${about.instagram}" target="_blank" class="social-btn" title="Instagram"><img src="assets/instagram.png" alt="Instagram"></a>` : '');
  document.getElementById('pImgWrap').style.display = '';
  setImage(about.img);
  document.getElementById('panel').classList.add('vis');
}

function activateNode(id) {
  if (inSub) return;
  if (activeId === id) { closePanel(); return; }
  activeId = id;
  clearTraces();
  const n = nodes[id];
  n.traces.forEach(tid => {
    const el = document.getElementById(tid);
    if (el) el.classList.add('lit');
  });
  const h = document.getElementById('h-' + id);
  if (h) h.classList.add('on');
  document.getElementById('pHeaderTitle').textContent = n.title;
  document.getElementById('pDesc').innerHTML = n.desc.split('\n').join('<br>');
  document.getElementById('pMore').style.display = 'inline-block';
  document.getElementById('pImgWrap').style.display = '';
  setImage(n.img);
  document.getElementById('panel').classList.add('vis');
}

/* Is `href` pointing at the same media that `embedSrc` already embeds?
   Used to decide whether a trailing "Watch here →" link is redundant.
   Content uses several YouTube URL shapes for the same video — youtu.be/ID,
   watch?v=ID, live/ID, embed/ID — so compare extracted IDs, not raw strings.
   Anything we can't identify returns false, i.e. keep the link. Better to
   show a duplicate link than to silently swallow a real one. */
function mediaKey(url) {
  if (!url) return null;
  let m;
  // YouTube, any shape
  m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|live\/|v\/))([A-Za-z0-9_-]{6,})/i);
  if (m) return 'yt:' + m[1];
  // Internet Archive details/embed
  m = url.match(/archive\.org\/(?:details|embed)\/([^/?#]+)/i);
  if (m) return 'ia:' + m[1];
  return null;
}

function sameMedia(href, embedSrc) {
  const a = mediaKey(href);
  const b = mediaKey(embedSrc);
  return a !== null && a === b;
}

function makeImg(src, extraStyle) {
  const wrap = document.createElement('div');
  wrap.className = 'sub-panel-img';
  if (extraStyle) wrap.style.cssText = extraStyle;
  const tryImg = new Image();
  tryImg.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block';
  tryImg.onload  = () => wrap.appendChild(tryImg);
  tryImg.onerror = () => { wrap.innerHTML = `<div class="sub-panel-img-ph">[ ${src} ]</div>`; };
  tryImg.src = src;
  return wrap;
}

function openSubPanel(item) {
  const inner = document.getElementById('subPanelInner');
  inner.innerHTML = '';

  if (item.embed) {
    const wrap = document.createElement('div');
    wrap.className = 'sub-panel-embed';
    wrap.innerHTML = `<iframe src="${item.embed}" allowfullscreen loading="lazy"></iframe>`;
    inner.appendChild(wrap);
  }

  if (item.localvideo) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;justify-content:center;padding:4px 0';
    const vid = document.createElement('video');
    vid.src = item.localvideo;
    vid.autoplay = true;
    vid.muted = true;
    vid.loop = true;
    vid.playsInline = true;
    vid.style.cssText = 'width:150px;height:150px;object-fit:cover;border-radius:6px;display:block';
    wrap.appendChild(vid);
    inner.appendChild(wrap);
  }

  if (item.img) inner.appendChild(makeImg(item.img));

  if (item.imgPair) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:8px;width:100%';
    item.imgPair.forEach(src => row.appendChild(makeImg(src, 'flex:1 1 0;min-width:0;height:140px')));
    inner.appendChild(row);
  }

  if (item.body) {
    let bodyHTML = item.body.split('\n').join('<br>');

    // A trailing link is only REDUNDANT if it points at the same media that's
    // already embedded above. Matching on wording ("watch"/"view"/"listen")
    // was wrong: it ate the Instagram link in ANIMATIONS, which says "View
    // more on my instagram" but goes somewhere else entirely. Compare the
    // destination instead — an off-site link survives any phrasing.
    if (item.embed) {
      const parts = bodyHTML.split('<br><br>');
      const last  = parts[parts.length - 1];
      if (parts.length > 1 && last.trim().startsWith('<a ')) {
        const hrefMatch = last.match(/href=['"]([^'"]+)['"]/i);
        if (hrefMatch && sameMedia(hrefMatch[1], item.embed)) {
          parts.pop();
          bodyHTML = parts.join('<br><br>');
        }
      }
    }

    const txt = document.createElement('div');
    txt.className = 'sub-panel-text';
    txt.innerHTML = bodyHTML;
    inner.appendChild(txt);
  }

  if (item.imgBelow) inner.appendChild(makeImg(item.imgBelow));

  document.getElementById('subPanelTitle').textContent = item.l;
  document.getElementById('subPanel').classList.add('vis');
}

function closeSubPanel() {
  document.getElementById('subPanel').classList.remove('vis');
  document.querySelectorAll('.sub-panel-embed iframe').forEach(f => { f.src = f.src; });
}

function drillIn() {
  if (!activeId || activeId === '__center') return;
  const id = activeId;
  const n = nodes[id];

  activeSubId = id;          // set before buildSubBoard — it reads writingLinks
  buildSubBoard(n.sub);

  const wl = document.getElementById('writingLinks');
  if (n.writingLinks && n.writingLinks.length) {
    wl.innerHTML = '<div class="writing-links-label">WRITING</div>' +
      n.writingLinks.map(lk => `<a href="${lk.url}" target="_blank">${lk.label}</a>`).join('');
    wl.classList.add('vis');
  } else {
    wl.innerHTML = '';
    wl.classList.remove('vis');
  }

  const trace = document.getElementById(n.traces[0]);
  if (trace) trace.classList.add('lit');

  setTimeout(() => {
    const main = document.getElementById('viewMain');
    const sub  = document.getElementById('viewSub');
    main.style.opacity = '0';
    main.style.transition = 'opacity 0.35s';
    setTimeout(() => {
      main.classList.add('hidden');
      sub.classList.remove('hidden');
      sub.style.opacity = '0';
      sub.style.transition = 'opacity 0.35s';
      requestAnimationFrame(() => requestAnimationFrame(() => { sub.style.opacity = '1'; }));
      inSub = true;
      const btn = document.getElementById('backArrow');
      btn.textContent = n.backPos.arrow;
      positionBackArrow(n.backPos.side);
      btn.classList.add('vis');
      closePanel();          // nulls activeId — activeSubId persists
    }, 350);
  }, 280);
}

function goHome() {
  closeSubPanel();
  const main = document.getElementById('viewMain');
  const sub  = document.getElementById('viewSub');
  sub.style.opacity = '0';
  sub.style.transition = 'opacity 0.3s';
  setTimeout(() => {
    sub.classList.add('hidden');
    main.classList.remove('hidden');
    main.style.opacity = '0';
    main.style.transition = 'opacity 0.3s';
    requestAnimationFrame(() => requestAnimationFrame(() => { main.style.opacity = '1'; }));
    inSub = false;
    activeId = null;
    activeSubId = null;
    currentSide = null;
    document.getElementById('backArrow').classList.remove('vis');
    document.getElementById('writingLinks').classList.remove('vis');
    clearTraces();
  }, 300);
}

document.getElementById('themeSwatch').style.background = THEMES[0].swatch;

document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => { repositionOuterNodes(); snapshotSVG(); }, 50);
  setTimeout(() => { repositionOuterNodes(); positionAllOrbitBtns(); }, 300);
});

requestAnimationFrame(() => {
  repositionOuterNodes();
  requestAnimationFrame(() => {
    positionAllOrbitBtns();
    setTimeout(positionAllOrbitBtns, 200);
    setTimeout(positionAllOrbitBtns, 500);
  });
});
