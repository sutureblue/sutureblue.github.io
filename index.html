<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>hello there.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="assets/favicon.png" type="image/png" />
</head>

<body>
  <div class="page">

    <div class="top">
      <header class="site-header">
        <video class="header-image" autoplay muted loop playsinline>
          <source src="assets/icon.webm" type="video/webm">
          <source src="assets/icon.mp4" type="video/mp4">
        </video>
      </header>

      <section class="hero">
        <h1>Bee Nix // Suture Blue</h1>
        <p>Thinking. Creating. Playing.</p>
        <p>Animations. Interactives. Games. Lectures.</p>
      </section>
    </div>

    <main>

      <!-- PRACTICE -->
      <section id="practice" class="section">
        <h2></h2>

        <div class="work-item">
          <div class="glow-card">
            <div class="glow-card-inner">

              <div class="carousel">
                <button class="carousel-btn left" type="button">‹</button>

                <div class="carousel-stage">
                  <div class="carousel-stack left"></div>

                  <div class="carousel-center" role="button" tabindex="0">
                    <img class="carousel-center-img" src="assets/gNg.png" alt="">
                  </div>

                  <div class="carousel-stack right"></div>
                </div>

                <button class="carousel-btn right" type="button">›</button>

                <!-- INLINE OVERLAY -->
                <div class="carousel-overlay" aria-hidden="true">
                  <div class="carousel-overlay-bar">
                    <button class="carousel-min">–</button>
                    <div class="carousel-overlay-title"></div>
                  </div>
                  <div class="carousel-overlay-scroll">
                    <div class="carousel-overlay-text"></div>
                  </div>
                </div>

                <div class="carousel-sources" hidden>
                  <img src="assets/glitchplay.png" data-title="Glitch Play (2025)" data-template=".tpl-glitchplay">
                  <img src="assets/gNg.png" data-title="Glitch'N'Games (2024)" data-template=".tpl-gng">
                  <img src="assets/mfru.png" data-title="MFRU (2023)" data-template=".tpl-mfru">
                </div>
              </div>
            </div>
          </div>

          <div class="work-meta">
            <h3 class="project-title"></h3>
          </div>

          <!-- templates -->
          <template class="tpl-glitchplay">
            <p>Glitch Play is my MFA thesis exploring glitch as play.</p>
          </template>

          <template class="tpl-gng">
            <p>Glitch'N'Games explored glitch + games across venues.</p>
          </template>

          <template class="tpl-mfru">
            <p>MFRU panel on digital archiving and community systems.</p>
          </template>
        </div>

      </section>

    </main>
  </div>

<script>
/* =========================
   CAROUSEL + INLINE OVERLAY
========================= */

document.querySelectorAll(".work-item").forEach((workItem) => {
  const carousel = workItem.querySelector(".carousel");

  const titleEl = workItem.querySelector(".project-title");
  const centerImg = carousel.querySelector(".carousel-center-img");
  const centerArea = carousel.querySelector(".carousel-center");

  const leftStackEl = carousel.querySelector(".carousel-stack.left");
  const rightStackEl = carousel.querySelector(".carousel-stack.right");

  const btnLeft = carousel.querySelector(".carousel-btn.left");
  const btnRight = carousel.querySelector(".carousel-btn.right");

  const overlay = carousel.querySelector(".carousel-overlay");
  const overlayText = carousel.querySelector(".carousel-overlay-text");
  const overlayTitle = carousel.querySelector(".carousel-overlay-title");
  const minBtn = carousel.querySelector(".carousel-min");

  const projects = Array.from(
    carousel.querySelectorAll(".carousel-sources img")
  ).map(img => ({
    src: img.src,
    title: img.dataset.title,
    template: img.dataset.template
  }));

  let center = 0;
  let leftStack = [];
  let rightStack = projects.map((_, i) => i).slice(1);

  function updateMeta() {
    titleEl.textContent = projects[center].title;
  }

  function renderStacks() {
    leftStackEl.innerHTML = "";
    rightStackEl.innerHTML = "";

    leftStack.forEach((idx, i) => {
      const el = document.createElement("div");
      el.className = "stack-card";
      el.style.setProperty("--stack-i", i);
      el.innerHTML = `<img src="${projects[idx].src}">`;
      leftStackEl.appendChild(el);
    });

    rightStack.forEach((idx, i) => {
      const el = document.createElement("div");
      el.className = "stack-card";
      el.style.setProperty("--stack-i", i);
      el.innerHTML = `<img src="${projects[idx].src}">`;
      rightStackEl.appendChild(el);
    });

    centerImg.src = projects[center].src;
    updateMeta();
  }

  function updateOverlay() {
    if (!overlay.classList.contains("active")) return;

    const p = projects[center];
    const tpl = document.querySelector(p.template);

    overlayText.innerHTML = tpl ? tpl.innerHTML : "";
    overlayTitle.textContent = p.title;
  }

  function next() {
    if (!rightStack.length) return;
    leftStack.unshift(center);
    center = rightStack.shift();
    renderStacks();
    updateOverlay();
  }

  function prev() {
    if (!leftStack.length) return;
    rightStack.unshift(center);
    center = leftStack.shift();
    renderStacks();
    updateOverlay();
  }

  function openOverlay() {
    const p = projects[center];
    const tpl = document.querySelector(p.template);

    overlayText.innerHTML = tpl ? tpl.innerHTML : "";
    overlayTitle.textContent = p.title;

    overlay.classList.add("active");
  }

  function closeOverlay() {
    overlay.classList.remove("active");
  }

  btnLeft.onclick = prev;
  btnRight.onclick = next;

  centerArea.onclick = openOverlay;
  titleEl.onclick = openOverlay;

  minBtn.onclick = closeOverlay;

  renderStacks();
});
</script>

</body>
</html>
